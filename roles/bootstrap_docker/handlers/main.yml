---
- name: Docker | Daemon-reload
  ansible.builtin.systemd:
    daemon_reload: true

- name: Docker | Restart Docker
  when:
    - bootstrap_docker__service_manage | bool
    - bootstrap_docker__service_restarted | bool
  ansible.builtin.service:
    name: docker
    state: restarted
  register: __docker_restart_result
  ignore_errors: true
