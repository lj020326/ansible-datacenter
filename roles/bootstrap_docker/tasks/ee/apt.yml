---
- name: Docker | EE | APT | Install Prerequisites for APT
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
  loop:
    - apt-transport-https
    - ca-certificates
    - curl
    - software-properties-common
  register: task_result
  until: task_result is success
  retries: 10
  delay: 2


# ==============================================================================
# SYSTEM SPECIFIC PLATFORM EXECUTION & INSTALL
# ==============================================================================
- name: Docker | EE | APT | Perform specific os tasks
  when: __os_task_file | length > 0
  vars:
    __os_task_file: "{{ lookup('first_found', __file_params, errors='ignore') }}"
    __file_params:
      skip: true
      files:
        - "{{ ansible_facts['distribution'] | lower }}-{{ ansible_facts['distribution_major_version'] | lower }}.yml"
        - "{{ ansible_facts['distribution'] | lower }}.yml"
      paths:
        - tasks/ee/os
  ansible.builtin.include_tasks: "{{ __os_task_file }}"

- name: Docker | EE | APT | Remove old repo lxc-docker
  ansible.builtin.apt:
    name: "{{ item }}"
    state: absent
  loop:
    - lxc-docker
    - docker
    - docker-engine
    - docker-ce
  register: task_result
  until: task_result is success
  retries: 10
  delay: 2

- name: Docker | EE | APT | Install Docker Engine
  ansible.builtin.apt:
    name: docker-ee
    state: present
  notify: Docker | Restart Docker
  register: task_result
  until: task_result is success
  retries: 10
  delay: 2
