---

- name: "{{ __bootstrap_docker__log_prefix_compose }} Check current docker-compose version."
  ansible.builtin.command: "{{ bootstrap_docker__cli_plugins_dir }}/docker-compose --version"
  register: __bootstrap_docker__installed_compose_version
  ignore_errors: false
  check_mode: false
  changed_when: false
  failed_when: false

- name: "{{ __bootstrap_docker__log_prefix_compose }} Display __bootstrap_docker__installed_compose_version"
  ansible.builtin.debug:
    var: __bootstrap_docker__installed_compose_version
    verbosity: 2

- name: "{{ __bootstrap_docker__log_prefix_compose }} Set __bootstrap_docker__compose_current_version"
  when:
    - __bootstrap_docker__installed_compose_version.stdout is defined
    - __bootstrap_docker__installed_compose_version.stdout | length > 0
  ansible.builtin.set_fact:
    __bootstrap_docker__compose_current_version: "{{ __bootstrap_docker__installed_compose_version.stdout
      | regex_search('(\\d+(\\.\\d+)+)') }}"

- name: "{{ __bootstrap_docker__log_prefix_compose }} Display __bootstrap_docker__compose_current_version"
  ansible.builtin.debug:
    var: __bootstrap_docker__compose_current_version | d('')

- name: "{{ __bootstrap_docker__log_prefix_compose }} Init __bootstrap_docker__compose_version"
  ansible.builtin.set_fact:
    __bootstrap_docker__compose_version: "{{ bootstrap_docker__compose_version | d('', true) }}"

- name: "{{ __bootstrap_docker__log_prefix_compose }} Get __bootstrap_docker__compose_version from GitHub"
  when: bootstrap_docker__compose_version | d('', true) | length == 0
  run_once: true
  block:
    - name: "{{ __bootstrap_docker__log_prefix_compose }} Fetch latest release metadata text"
      ansible.builtin.uri:
        url: "https://api.github.com/repos/docker/compose/releases/latest"
        return_content: true
      register: __compose_latest_version_result
      run_once: true

    - name: "{{ __bootstrap_docker__log_prefix_compose }} Display __compose_latest_version_result.json.tag_name"
      ansible.builtin.debug:
        var: __compose_latest_version_result.json.tag_name | d('')

    - name: "{{ __bootstrap_docker__log_prefix_compose }} Set fallback version context from content block"
      ansible.builtin.set_fact:
        __bootstrap_docker__compose_version: >-
          {{
            (__compose_latest_version_result.content | from_json).tag_name
            if __compose_latest_version_result.content is defined
            else (__compose_latest_version_result.json.tag_name | default('v2.29.2'))
          }}

# ==============================================================================
# ENHANCED ENGINE DEPLOYMENT & PLATFORM-SPECIFIC SYMLINK FRAMEWORK
# ==============================================================================

- name: "{{ __bootstrap_docker__log_prefix_compose }} Ensure cli-plugins directory exists"
  ansible.builtin.file:
    path: "{{ bootstrap_docker__cli_plugins_dir }}"
    state: directory
    mode: "0755"

- name: "{{ __bootstrap_docker__log_prefix_compose }} Download official native Go docker-compose engine to CLI plugins"
  ansible.builtin.get_url:
    url: "{{ bootstrap_docker__compose_url }}"
    dest: "{{ bootstrap_docker__cli_plugins_dir }}/docker-compose"
    mode: "0755"
    force: "{{ __bootstrap_docker__compose_current_version != __bootstrap_docker__compose_version | regex_search('(\\d+(\\.\\d+)+)') }}"

- name: "{{ __bootstrap_docker__log_prefix_compose }} Clean out legacy standalone docker-compose binary"
  ansible.builtin.file:
    path: /usr/bin/docker-compose
    state: absent

- name: "{{ __bootstrap_docker__log_prefix_compose }} Link standalone command line wrapper to official framework version"
  ansible.builtin.file:
    src: "{{ bootstrap_docker__cli_plugins_dir }}/docker-compose"
    dest: /usr/bin/docker-compose
    state: link
    force: true

# ==============================================================================
# PIP DEPENDENCIES (Maintained for Ansible Core Module Hooks)
# ==============================================================================
- name: "{{ __bootstrap_docker__log_prefix_compose }} Ensure docker-compose pip packages are installed"
  when: bootstrap_docker__compose_pip_packages | length > 0
  ansible.builtin.pip:
    name: "{{ item.name }}"
    state: "{{ item.state | d('present') }}"
    version: "{{ item.version | d(omit) }}"
    virtualenv: "{{ bootstrap_docker__pip_virtualenv | d(omit, true) }}"
  loop: "{{ bootstrap_docker__compose_pip_packages }}"
