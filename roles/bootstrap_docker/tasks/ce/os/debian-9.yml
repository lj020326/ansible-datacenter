---
- name: Docker | CE | Debian | Install the Debian Backports repository using DEB822 format
  ansible.builtin.deb822_repository:
    name: debian-backports
    types: [deb]
    uris: ["http://archive.debian.org/debian"]
    suites: ["{{ ansible_facts['distribution_release'] }}-backports"]
    components: [main contrib non-free]
    state: present
