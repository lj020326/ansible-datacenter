---
- name: "{{ __bootstrap_docker__log_prefix_apt }} Remove old repo lxc-docker"
  ansible.builtin.apt:
    name:
      - docker
      - docker-engine
      - docker-io
    state: absent
  register: task_result
  until: task_result is success
  retries: 5
  delay: 2

- name: "{{ __bootstrap_docker__log_prefix_apt }} Install Prerequisites for APT"
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - software-properties-common
      - gnupg2
      - python3-debian
    state: present
  register: task_result
  until: task_result is success
  retries: 10
  delay: 2

- name: "{{ __bootstrap_docker__log_prefix_apt }} Ensure key absent from system keyring dir {{ bootstrap_docker__apt_system_keyring_dir }}"
  ansible.builtin.file:
    name: "{{ bootstrap_docker__apt_system_keyring_dir }}/docker.gpg"
    state: absent

- name: "{{ __bootstrap_docker__log_prefix_apt }} Ensure docker gpg key in system keyring dir {{ bootstrap_docker__apt_keyring_dir }}"
  ansible.builtin.get_url:
    url: "{{ bootstrap_docker__ce_gpg_key }}"
    dest: "{{ bootstrap_docker__apt_keyring_dir }}/docker.asc"
    mode: "0644"
    force: true

# ==============================================================================
# REMOVE LEGACY DEPRECATED REPOSITORY DEFINITIONS
# ==============================================================================
- name: "{{ __bootstrap_docker__log_prefix_apt }} Remove existing legacy Docker repository file"
  ansible.builtin.file:
    path: "/etc/apt/sources.list.d/{{ bootstrap_docker__repo }}-{{ bootstrap_docker__edition }}.list"
    state: absent

- name: "{{ __bootstrap_docker__log_prefix_apt }} Install python-debian for DEB822 support"
  ansible.builtin.pip:
    name: python-debian
    state: present
    executable: "{{ ansible_virtualenv_python_interpreter | replace('python', 'pip') }}"
  vars:
    # Use system python to execute the pip module code, but target the venv binary
    ansible_python_interpreter: "{{ os_python_interpreter }}"

# ==============================================================================
# UPGRADE TO MODERN DEB822 REPOSITORY SCHEMAS
# ==============================================================================
- name: "{{ __bootstrap_docker__log_prefix_apt }} Configure Docker repository using DEB822 format"
  ansible.builtin.deb822_repository:
    name: "{{ bootstrap_docker__repo }}-{{ bootstrap_docker__edition }}"
    types: [deb]
    uris: ["{{ bootstrap_docker__ce_repo_url }}"]
    suites: ["{{ ansible_facts['distribution_release'] }}"]
    components: ["{{ bootstrap_docker__channel }}"]
    signed_by: "{{ bootstrap_docker__apt_keyring_dir }}/docker.asc"
    state: present

- name: "{{ __bootstrap_docker__log_prefix_apt }} Enable Edge repository using DEB822 format"
  when: bootstrap_docker__channel == "edge"
  ansible.builtin.deb822_repository:
    name: "{{ bootstrap_docker__repo }}-{{ bootstrap_docker__edition }}-edge"
    types: [deb]
    uris: ["{{ bootstrap_docker__ce_repo_url }}"]
    suites: ["{{ ansible_facts['distribution_release'] }}"]
    components: [edge]
    signed_by: "{{ bootstrap_docker__apt_keyring_dir }}/docker.asc"
    state: present

# ==============================================================================
# SYSTEM SPECIFIC PLATFORM EXECUTION & INSTALL
# ==============================================================================
- name: "{{ __bootstrap_docker__log_prefix_apt }} Perform specific os tasks"
  when: __os_task_file | length > 0
  vars:
    __os_task_file: "{{ lookup('first_found', __file_params, errors='ignore') }}"
    __file_params:
      skip: true
      files:
        - "{{ ansible_facts['distribution'] | lower }}-{{ ansible_facts['distribution_major_version'] | lower }}.yml"
        - "{{ ansible_facts['distribution'] | lower }}.yml"
      paths:
        - tasks/ce/os
  ansible.builtin.include_tasks: "{{ __os_task_file }}"

- name: "{{ __bootstrap_docker__log_prefix_apt }} Refresh APT cache for new repositories"
  ansible.builtin.apt:
    update_cache: true

- name: "{{ __bootstrap_docker__log_prefix_apt }} Install docker-ce"
  ansible.builtin.package:
    name: "{{ bootstrap_docker__packages }}"
    state: present
  notify: Docker | Restart Docker
  register: task_result
  until: task_result is success
  retries: 5
  delay: 5

- name: "{{ __bootstrap_docker__log_prefix_apt }} Clean BuildKit state on DGX / ARM64"
  when:
    - __bootstrap_docker__is_dgx | bool
    - "'docker-ce' in bootstrap_docker__packages"
  ansible.builtin.file:
    path: /var/lib/docker/buildkit
    state: absent
