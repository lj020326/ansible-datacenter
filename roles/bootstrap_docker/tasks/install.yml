---

- name: "Docker | OS not supported by docker-ce"
  when:
    - bootstrap_docker__edition == "ce"
    - (ansible_facts['distribution'] | lower == "centos"
       and ansible_facts['distribution_major_version'] | int <= 6)
      or ansible_facts['distribution'] | lower == "oraclelinux"
  ansible.builtin.fail:
    msg: This OS is not supported by Docker-CE, and therefore not supported by this role.

- name: "Docker | Include {{ ansible_facts['distribution'] }} specific variables"
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - "{{ ansible_facts['distribution'] | lower }}-{{ ansible_facts['distribution_major_version'] | lower }}.yml"
    - "{{ ansible_facts['distribution'] | lower }}.yml"
    - "{{ ansible_facts['os_family'] | lower }}.yml"
    - default.yml

- name: "Docker | Display __bootstrap_docker__is_dgx"
  ansible.builtin.debug:
    var: __bootstrap_docker__is_dgx

- name: "Docker | Ensure DGX-OS specific settings"
  when:
    - ansible_facts['distribution'] == 'Ubuntu'
    - __bootstrap_docker__is_dgx | bool
  ansible.builtin.include_vars: dgx.yml

- name: Docker | EE | Check Requirements
  when:
    - bootstrap_docker__edition == "ee"
    - bootstrap_docker__ee_url is not defined
  ansible.builtin.fail:
    msg: Variable bootstrap_docker__ee_url is required and is not defined.

- name: Docker | Storage Driver
  when: bootstrap_docker__storage_driver is defined
  ansible.builtin.include_tasks: storage_drivers/{{ bootstrap_docker__storage_driver }}.yml

- name: Docker | Start Installation using {{ ansible_facts['pkg_mgr'] }} package manager
  when: bootstrap_docker__repo == "docker"
  ansible.builtin.include_tasks: "{{ bootstrap_docker__edition }}/{{ ansible_facts['pkg_mgr'] }}.yml"

- name: Docker | Start Installation using {{ ansible_facts['pkg_mgr'] }} package manager using RHSM
  when: bootstrap_docker__repo == "rhsm"
  ansible.builtin.include_tasks: "{{ bootstrap_docker__edition }}/{{ ansible_facts['pkg_mgr'] }}-rhsm.yml"

- name: Docker | Start Installation | Other repo
  when: bootstrap_docker__repo == "other"
  ansible.builtin.include_tasks: other_repo.yml

- name: Docker | Install additional packages
  when: bootstrap_docker__additional_packages | d([], true) | length > 0
  ansible.builtin.package:
    name: "{{ bootstrap_docker__additional_packages }}"
    state: present

- name: Docker | Configure cross-platform QEMU emulation
  when:
    - bootstrap_docker__multiarch_builder_enabled | bool
    - (not bootstrap_docker__swarm_node) or (bootstrap_docker__swarm_leader | bool)
  ansible.builtin.include_tasks: ensure_multiarch_builder.yml

- name: Docker | Ensure service starts at boot
  ansible.builtin.service:
    name: docker
    enabled: "{{ bootstrap_docker__service_enabled }}"

- name: Docker | Setup LVM for docker
  when: bootstrap_docker__setup_lvm | bool
  ansible.builtin.include_tasks: lvm_setup.yml

- name: Docker | Deploy Config
  when: not bootstrap_docker__k8s_mode
  ansible.builtin.include_tasks: deploy_config.yml

- name: Docker | Proxy configuration
  when: >
    bootstrap_docker__http_proxy is defined 
    or bootstrap_docker__https_proxy is defined 
    or bootstrap_docker__no_proxy_params is defined
  ansible.builtin.include_tasks: proxy.yml

- name: Docker | Setup docker users
  when:
    - bootstrap_docker__users is defined
    - not bootstrap_docker__k8s_mode
  ansible.builtin.include_tasks: docker_users.yml

- name: Docker | Ensure service started
  when: bootstrap_docker__service_started | bool
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
  register: __docker_start_result
  retries: 3
  delay: 5
  until: __docker_start_result is success

- name: Docker | Setup docker-compose
  when:
    - bootstrap_docker__install_compose
    - not bootstrap_docker__k8s_mode
  ansible.builtin.include_tasks: docker_compose.yml

- name: Docker | Get docker system info on docker host
  when:
    - bootstrap_docker__service_started | bool
    - bootstrap_docker__install_compose
    - not bootstrap_docker__k8s_mode
  block:

    - name: Docker | Get docker system info on docker host
      community.docker.docker_host_info:
      register: __docker_info_result

    - name: Docker | Display essential docker system info
      ansible.builtin.debug:
        msg:
          can_talk_to_docker: "{{ __docker_info_result.can_talk_to_docker }}"
          server_version: "{{ __docker_info_result.host_info.ServerVersion | default('N/A') }}"
          operating_system: "{{ __docker_info_result.host_info.OperatingSystem | default('N/A') }}"
          swarm_state: "{{ __docker_info_result.host_info.Swarm.LocalNodeState | default('inactive') }}"
          containers_running: "{{ __docker_info_result.host_info.ContainersRunning | default(0) }}"

    - name: Docker | Display full __docker_info_result
      ansible.builtin.debug:
        var: __docker_info_result
        verbosity: 2

    - name: Docker | Assert docker setup successful
      ansible.builtin.assert:
        that:
          - not __docker_info_result.failed
