---
- name: check if figurine is installed already
  ansible.builtin.stat:
    path: /usr/local/bin/figurine
  register: __file_result

- name: Display bootstrap_linux_core__figurine_url
  ansible.builtin.debug:
    var: bootstrap_linux_core__figurine_url

- name: download and install figurine
  when: not __file_result.stat.exists or bootstrap_linux_core__figurine_force_config
  block:
    - name: download and unpack figurine
      ansible.builtin.unarchive:
        src: "{{ bootstrap_linux_core__figurine_url }}"
        dest: /tmp
        remote_src: true
      register: __unarchive_result
      until: __unarchive_result is success
      retries: 3
      delay: 5

    - name: move extracted file to bin directory
      ansible.builtin.copy:
        src: /tmp/deploy/figurine
        dest: /usr/local/bin/
        mode: preserve
        remote_src: true

    - name: configure login
      ansible.builtin.template:
        src: figurine.sh.j2
        dest: /etc/profile.d/figurine.sh
        mode: "0644"
        backup: true
