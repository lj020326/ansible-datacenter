---
- name: Create Caddy service account
  no_log: true
  ansible.builtin.user:
    name: "{{ bootstrap_caddy2__user }}"
    password: "*"
    shell: /sbin/nologin
    home: "{{ bootstrap_caddy2__install_root }}"
    system: true

- name: Getting Caddy 2
  ansible.builtin.unarchive:
    url: "{{ bootstrap_caddy2__bin_url }}"
    remote_src: true
    dest: "{{ bootstrap_caddy2__install_root }}"
    owner: "{{ bootstrap_caddy2__user }}"
    group: "{{ bootstrap_caddy2__user }}"
    mode: u=rwx,go=rx

- name: Installing systemd service
  ansible.builtin.template:
    dest: /etc/systemd/system/caddy2.service
    src: caddy2.service
    mode: "0644"

- name: Creating Caddyfile
  ansible.builtin.copy:
    dest: "{{ bootstrap_caddy2__install_root }}/Caddyfile"
    content: "{{ bootstrap_caddy2__file }}"
    owner: "{{ bootstrap_caddy2__user }}"
    group: "{{ bootstrap_caddy2__user }}"
    mode: ug=rw,o=r

- name: Starting service
  ansible.builtin.systemd:
    daemon-reload: true
    name: caddy2
    enabled: true
    state: restarted
