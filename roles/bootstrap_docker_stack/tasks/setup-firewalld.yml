---
- name: "{{ __docker_stack__log_prefix__setup_firewalld }} Set the firewall services"
#  when: __docker_stack__app_configs[item.name].firewalld_services | d([], true) | length > 0
  ansible.builtin.set_fact:
    __docker_stack__firewalld_services: "{{ (__docker_stack__firewalld_services | d([], true) +
      __docker_stack__app_configs[item.name].firewalld_services | d([], true)) | flatten | unique
      }}"
  loop: "{{ __docker_stack__service_groups }}"
  loop_control:
    label: "{{ item.name }}"

- name: "{{ __docker_stack__log_prefix__setup_firewalld }} Set the firewall ports"
#  when: __docker_stack__app_configs[item.name].firewalld_ports | d([], true) | length > 0
  ansible.builtin.set_fact:
    __docker_stack__firewalld_ports: "{{ (__docker_stack__firewalld_ports | d([], true) +
      __docker_stack__app_configs[item.name].firewalld_ports | d([], true)) | flatten | unique }}"
  loop: "{{ __docker_stack__service_groups }}"
  loop_control:
    label: "{{ item.name }}"

- name: "{{ __docker_stack__log_prefix__setup_firewalld }} Display __docker_stack__firewalld_services"
  ansible.builtin.debug:
    var: __docker_stack__firewalld_services

- name: "{{ __docker_stack__log_prefix__setup_firewalld }} Display __docker_stack__firewalld_ports"
  ansible.builtin.debug:
    var: __docker_stack__firewalld_ports

- name: "{{ __docker_stack__log_prefix__setup_firewalld }} Configure firewall for docker stack apps"
  ansible.builtin.include_role:
    name: bootstrap_linux_firewalld
  vars:
    firewalld_action: configure
    firewalld_services: "{{ __docker_stack__firewalld_services | d([], true) }}"
    firewalld_ports: "{{ __docker_stack__firewalld_ports | d([], true) }}"
