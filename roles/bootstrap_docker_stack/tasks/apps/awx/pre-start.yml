---
- name: Build and deploy AWX
  vars:
    ansible_python_interpreter: "{{ ansible_python_docker_interpreter }}"
  ansible.builtin.include_role:
    name: awx-docker

- name: Build and deploy AWX {{ awx_orig_container_prefix }}
  when: awx_orig_enabled
  vars:
    ansible_python_interpreter: "{{ ansible_python_docker_interpreter }}"
    bootstrap_awx_docker__version: "{{ awx_orig_dockerhub_version }}"
    bootstrap_awx_docker__web_image: "{{ awx_orig_web_image }}"
    bootstrap_awx_docker__task_image: "{{ awx_orig_task_image }}"
    bootstrap_awx_docker__postgresql_version: "{{ awx_orig_postgresql_version }}"
    bootstrap_awx_docker__postgres_data_dir: "{{ awx_orig_postgres_data_dir }}"
    bootstrap_awx_docker__docker_compose_dir: "{{ awx_orig_docker_compose_dir }}"
    bootstrap_awx_docker__project_data_dir: "{{ awx_orig_project_data_dir }}"
    bootstrap_awx_docker__host_port: "{{ awx_orig_host_port }}"
    bootstrap_awx_docker__host_port_ssl: "{{ awx_orig_host_port_ssl }}"
    bootstrap_awx_docker__pg_password: "{{ awx_orig_pg_password }}"
    bootstrap_awx_docker__memcached_port: "{{ awx_orig_memcached_port }}"
    bootstrap_awx_docker__container_prefix: "{{ awx_orig_container_prefix }}"
    bootstrap_awx_docker__container_config_templates: "{{ awx_orig_container_config_templates }}"
    bootstrap_awx_docker__web_volumes: "{{ awx_orig_web_volumes }}"
  ansible.builtin.include_role:
    name: bootstrap_awx_docker
