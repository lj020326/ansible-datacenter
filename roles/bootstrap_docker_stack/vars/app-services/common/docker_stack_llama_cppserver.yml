---

__docker_stack__llama_cppserver__stack_dir: "{{ docker_stack__dir | d('/home/user/docker-dirs') }}"
__docker_stack__llama_cppserver__base_dir_default: "{{ __docker_stack__llama_cppserver__stack_dir }}/llama_cppserver"
__docker_stack__llama_cppserver__base_dir: "{{ docker_stack__llama_cppserver__dir | d(__docker_stack__llama_cppserver__base_dir_default) }}"
__docker_stack__llama_cppserver__models_dir: "{{ __docker_stack__llama_cppserver__base_dir }}/models"

# official, always up-to-date
__docker_stack__llama_cppserver__image_default: "ghcr.io/ggml-org/llama.cpp:server-cuda"
__docker_stack__llama_cppserver__image: "{{ docker_stack__llama_cppserver__image
  | d(__docker_stack__llama_cppserver__image_default) }}"

# Listener bind ports
__docker_stack__llama_cppserver__http_port: "{{ docker_stack__llama_cppserver__http_port | d('11432') }}"
__docker_stack__llama_cppserver__internal_http_port: "8080"

__docker_stack__llama_cppserver__config_dirs:
  - path: "{{ __docker_stack__llama_cppserver__base_dir }}"
  - path: "{{ __docker_stack__llama_cppserver__models_dir }}"

__docker_stack__llama_cppserver__config_tpls:
  - src: llama_cppserver/llama_cpp.env.j2
    dest: "{{ __docker_stack__llama_cppserver__base_dir }}/llama_cpp.env"

__docker_stack__llama_cppserver__secret_key: "{{ docker_stack__llama_cppserver__secret_key
  | d('CHANGEME123') }}"

__docker_stack__llama_cppserver__firewalld_ports:
  - "{{ __docker_stack__llama_cppserver__http_port }}/tcp"

docker_stack__appspec__llama_cppserver:
  dirs: "{{ __docker_stack__llama_cppserver__config_dirs | d([], true) }}"
  files: "{{ __docker_stack__llama_cppserver__config_files | d([], true) }}"
  templates: "{{ __docker_stack__llama_cppserver__config_tpls | d([], true) }}"
  secrets: "{{ __docker_stack__llama_cppserver__secrets | d({}, true) }}"
  firewalld_services: "{{ __docker_stack__llama_cppserver__firewalld_services | d([], true) }}"
  firewalld_ports: "{{ __docker_stack__llama_cppserver__firewalld_ports | d([], true) }}"
  docker_services: "{{ __docker_stack__llama_cppserver__services | d({}, true) }}"

__docker_stack__llama_cppserver__services:
  ########################
  ## LLAMA.CPP SERVER (for speculative decoding + Continue.dev)
  llama-cpp:
    image: "{{ __docker_stack__llama_cppserver__image }}"
    container_name: llama-cpp
    restart: unless-stopped
    networks:
      - "{{ docker_stack__network_name__traefik_proxy }}"
    ports:
      # OpenAI-compatible endpoint
      - "{{ __docker_stack__llama_cppserver__http_port }}:{{ __docker_stack__llama_cppserver__internal_http_port }}"
    env_file:
      - llama_cppserver/llama_cpp.env
    volumes:
#      - /etc/timezone:/etc/timezone:ro
#      - /etc/localtime:/etc/localtime:ro
      - "{{ __docker_stack__llama_cppserver__models_dir }}:/models:ro"
    deploy:
      mode: replicated
      placement:
        constraints:
          - node.role == manager
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      resources:
        reservations:
          generic_resources:
            - discrete_resource_spec:
                kind: 'NVIDIA-GPU'
                value: 1
#          devices:
#            - driver: nvidia
#              # or device_ids: ["0"] if you want specific GPU
#              count: all
#              capabilities: [gpu]
#          devices:
#            - driver: nvidia
#              count: 1
#              capabilities: [gpu]
