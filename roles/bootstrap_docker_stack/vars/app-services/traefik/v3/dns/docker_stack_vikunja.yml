---

__docker_stack__vikunja__endpoint: "kanban.{{ docker_stack__internal_domain }}"

__docker_stack__vikunja__traefik_labels_base_default:
  - "traefik.enable=true"
  - "traefik.docker.network={{ docker_stack__network_name__traefik_proxy }}"
  - "traefik.http.routers.vikunja.rule=Host(`{{ __docker_stack__vikunja__endpoint }}`)"
  - "traefik.http.routers.vikunja.entrypoints=https"
  - "traefik.http.routers.vikunja.tls=true"
  - "traefik.http.services.vikunja.loadbalancer.server.port=3456"
  - "traefik.http.services.vikunja.loadbalancer.server.scheme=http"

__docker_stack__vikunja__traefik_labels_default: >-
  {{
    __docker_stack__vikunja__traefik_labels_base_default
    + (__docker_stack__traefik__labels_swarm_default if docker_stack__swarm_mode | bool else [])
  }}
