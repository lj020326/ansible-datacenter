---

#__docker_stack__vllm__endpoint: "vault.{{ __docker_stack__vllm__domain }}"

__docker_stack__vllm__traefik_labels_base_default:
  - "traefik.enable=true"
  - "traefik.http.routers.vllm.entrypoints=https"
  - "traefik.http.routers.vllm.rule=Host(`{{ __docker_stack__vllm__host_addr }}`)"
  - "traefik.http.routers.vllm.service=vllm-svc"
  # Add middleware to ensure X-Forwarded-Proto is set to https
  - "traefik.http.services.vllm-svc.loadbalancer.server.port={{ __docker_stack__vllm__internal_http_port }}"
  - "traefik.http.services.vllm-svc.loadbalancer.server.scheme=http"

__docker_stack__vllm__traefik_labels_default: >-
  {{
    __docker_stack__vllm__traefik_labels_base_default
    + (__docker_stack__traefik__labels_swarm_default if docker_stack__swarm_mode | bool else [])
  }}
