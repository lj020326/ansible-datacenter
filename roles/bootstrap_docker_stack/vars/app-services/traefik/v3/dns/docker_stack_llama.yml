---

#__docker_stack__llama__endpoint: "vault.{{ __docker_stack__llama__domain }}"

__docker_stack__llama__traefik_labels_base_default:
  - "traefik.enable=true"
  - "traefik.http.routers.llama.entrypoints=https"
  - "traefik.http.routers.llama.rule=Host(`{{ __docker_stack__llama__host_addr }}`)"
  - "traefik.http.routers.llama.service=llama-svc"
  # Add middleware to ensure X-Forwarded-Proto is set to https
  - "traefik.http.services.llama-svc.loadbalancer.server.port={{ __docker_stack__llama__internal_http_port }}"
  - "traefik.http.services.llama-svc.loadbalancer.server.scheme=http"

__docker_stack__llama__traefik_labels_default: >-
  {{
    __docker_stack__llama__traefik_labels_base_default
    + (__docker_stack__traefik__labels_swarm_default if docker_stack__swarm_mode | bool else [])
  }}
