---

__docker_stack__wekan__endpoint: "wekan.{{ docker_stack__internal_domain }}"

__docker_stack__wekan__traefik_labels_base_default:
  - "traefik.enable=true"
  - "traefik.http.routers.wekan.rule=Host(`{{ __docker_stack__wekan__endpoint }}`)"
  - "traefik.http.routers.wekan.entrypoints=https"
  - "traefik.http.routers.wekan.tls=true"
  - "traefik.http.services.wekan.loadbalancer.server.port=8080"
  - "traefik.http.services.wekan.loadbalancer.server.scheme=http"

__docker_stack__wekan__traefik_labels_default: >-
  {{
    __docker_stack__wekan__traefik_labels_base_default
    + (__docker_stack__traefik__labels_swarm_default if docker_stack__swarm_mode | bool else [])
  }}
