---

__docker_stack__plane__endpoint: "plane.{{ docker_stack__internal_domain }}"

__docker_stack__plane__traefik_labels_base_default:
  - "traefik.enable=true"
#  - "traefik.docker.network={{ docker_stack__network_name__traefik_proxy }}"
  - "traefik.http.routers.plane.rule=Host(`{{ __docker_stack__plane__endpoint }}`)"
  - "traefik.http.routers.plane.entrypoints=https"
  - "traefik.http.routers.plane.tls=true"
  - "traefik.http.services.plane.loadbalancer.server.port=3000"
  - "traefik.http.services.plane.loadbalancer.server.scheme=http"

__docker_stack__plane__traefik_labels_default: >-
  {{
    __docker_stack__plane__traefik_labels_base_default
    + (__docker_stack__traefik__labels_swarm_default if docker_stack__swarm_mode | bool else [])
  }}
