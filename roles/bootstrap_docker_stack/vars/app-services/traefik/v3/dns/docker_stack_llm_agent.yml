---

__docker_stack__llm_agent__endpoint: "orchestrator.{{ docker_stack__internal_domain }}"

__docker_stack__llm_agent__traefik_labels_base_default:
  - "traefik.enable=true"
  - "traefik.docker.network={{ docker_stack__network_name__traefik_proxy }}"
  - "traefik.http.routers.llm_agent.rule=Host(`{{ __docker_stack__llm_agent__endpoint }}`)"
  - "traefik.http.routers.llm_agent.entrypoints=https"
  - "traefik.http.routers.llm_agent.tls=true"
  - "traefik.http.services.llm_agent.loadbalancer.server.port=8000"
  - "traefik.http.services.llm_agent.loadbalancer.server.scheme=http"

__docker_stack__llm_agent__traefik_labels_default: >-
  {{
    __docker_stack__llm_agent__traefik_labels_base_default
    + (__docker_stack__traefik__labels_swarm_default if docker_stack__swarm_mode | bool else [])
  }}
