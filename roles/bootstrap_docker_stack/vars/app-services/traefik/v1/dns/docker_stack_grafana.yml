---

__docker_stack__grafana__traefik_labels_default:
#__docker_stack__grafana__config_tpls:
#  ## ref: https://github.com/ansible/ansible/issues/22358
#  - { src: "caddy/Caddyfile.j2", dest: "{{ __docker_stack__grafana__stack_dir }}/dockerd-exporter/Caddyfile" }
__docker_stack__grafana__services:

  ## Promotheus/Grafana stack per:
  ## ref: https://github.com/stefanprodan/swarmprom/blob/master/docker-compose.traefik.yml
  ## ref: https://github.com/stefanprodan/caddy-dockerd
  dockerd-exporter:
    container_name: dockerd-exporter
    image: stefanprodan/caddy
    restart: always
    networks:
      - "{{ docker_stack__network_name__default }}"
    environment:
      DOCKER_GWBRIDGE_IP: 172.18.0.1
    configs:
      - source: dockerd_config
        target: /etc/caddy/Caddyfile
#      deploy:
#        mode: global
#        resources:
#          limits:
#            memory: 128M
#          reservations:
#            memory: 64M

docker_stack__appspec__grafana:
  dirs: "{{ __docker_stack__grafana__config_dirs | d([], true) }}"
  files: "{{ __docker_stack__grafana__config_files | d([], true) }}"
  templates: "{{ __docker_stack__grafana__config_tpls | d([], true) }}"
  firewalld_services: "{{ __docker_stack__grafana__firewalld_services | d([], true) }}"
  firewalld_ports: "{{ __docker_stack__grafana__firewalld_ports | d([], true) }}"
  networks: "{{ __docker_stack__grafana__networks | d({}, true) }}"
  volumes: "{{ __docker_stack__grafana__volumes | d({}, true) }}"
  docker_services: "{{ __docker_stack__grafana__services | d({}, true) }}"
