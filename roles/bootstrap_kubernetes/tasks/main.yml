---
- name: Update apt cache and install necessary packages
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - software-properties-common
    state: present
    update_cache: true

- name: Add Docker GPG key
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker APT repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Install Docker Engine
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: present

- name: Configure Docker to use systemd cgroup driver
  ansible.builtin.copy:
    content: |
      {
        "exec-opts": ["native.cgroupdriver=systemd"],
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "100m"
        },
        "storage-driver": "overlay2"
      }
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: '0644'
  notify: Restart Docker

- name: Ensure Docker service is started and enabled
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Add Kubernetes GPG key
  ansible.builtin.apt_key:
    url: https://pkgs.k8s.io/core:/stable:/v1.28/deb/Release.key
    state: present # This will add the key if it's not already there

- name: Add Kubernetes APT repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.28/deb/ /"
    state: present
    filename: kubernetes

- name: Update apt cache again after adding Kubernetes repo
  ansible.builtin.apt:
    update_cache: true

- name: Install kubelet, kubeadm, and kubectl
  ansible.builtin.apt:
    name:
      - kubelet={{ bootstrap_kubernetes__version }}
      - kubeadm={{ bootstrap_kubernetes__version }}
      - kubectl={{ bootstrap_kubernetes__version }}
    state: present
    allow_unauthenticated: true # Needed if keys are not perfectly aligned, though should be fine with previous steps
    force_apt_get: true # Ensures apt-get is used for version pinning
  register: install_kubernetes_packages

- name: Hold kubelet, kubeadm, and kubectl packages to prevent updates
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubelet
    - kubeadm
    - kubectl

- name: Disable swap
  ansible.posix.mount:
    name: swap
    fstype: swap
    state: absent

- name: Comment out swap in /etc/fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^(\S+\s+swap\s+.*)$'
    replace: '#\1'

- name: Enable kernel modules for Kubernetes
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - br_netfilter
    - overlay

- name: Ensure kernel modules are loaded at boot
  ansible.builtin.copy:
    content: |
      br_netfilter
      overlay
    dest: /etc/modules-load.d/k8s.conf
    owner: root
    group: root
    mode: '0644'

- name: Configure sysctl parameters for Kubernetes
  ansible.builtin.copy:
    content: |
      net.bridge.bridge-nf-call-ip6tables = 1
      net.bridge.bridge-nf-call-iptables = 1
      net.ipv4.ip_forward = 1
    dest: /etc/sysctl.d/k8s.conf
    owner: root
    group: root
    mode: '0644'

- name: Apply sysctl parameters
  ansible.builtin.command: sysctl --system
  changed_when: true

- name: Initialize Kubernetes cluster (master node)
  ansible.builtin.command: >
    kubeadm init
    --pod-network-cidr={{ bootstrap_kubernetes__pod_network_cidr }}
    --kubernetes-version={{ bootstrap_kubernetes__version_short }}
  args:
    creates: /etc/kubernetes/admin.conf
  when: not kubernetes_cluster_initialized.stat.exists # Only run if cluster not initialized
  register: kubeadm_init_result

- name: Check if Kubernetes cluster is already initialized
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: kubernetes_cluster_initialized

- name: Create .kube directory for ubuntu user
  ansible.builtin.file:
    path: /home/ubuntu/.kube
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0755'

- name: Copy admin.conf to ubuntu user's .kube directory
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/ubuntu/.kube/config
    remote_src: true
    owner: ubuntu
    group: ubuntu
    mode: '0644'

- name: Install Calico CNI
  ansible.builtin.shell: >
    kubectl --kubeconfig=/etc/kubernetes/admin.conf apply -f https://docs.tigera.io/calico/latest/manifests/calico.yaml
  args:
    creates: /etc/kubernetes/manifests/calico.yaml # A simple way to check if CNI is applied
  when: not calico_cni_applied.stat.exists # Only run if Calico CNI not applied
  register: calico_install_result

- name: Check if Calico CNI is already applied
  ansible.builtin.stat:
    path: /etc/kubernetes/manifests/calico.yaml
  register: calico_cni_applied

- name: Untaint master node if it's the only node
  ansible.builtin.command: >
    kubectl --kubeconfig=/etc/kubernetes/admin.conf taint nodes --all node-role.kubernetes.io/control-plane-
  when: inventory_hostname == groups['all'][0] # Only untaint if this is the first (and likely only) node
  changed_when: true
#  ignore_errors: true # In case the taint isn't present initially
  failed_when:
    - not (untaint_result.stderr | regex_search("taint not found"))
    - untaint_result.rc != 0
  register: untaint_result
