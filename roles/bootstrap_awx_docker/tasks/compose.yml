---
- name: Create {{ bootstrap_awx_docker__inventory_dir }} directory
  ansible.builtin.file:
    path: "{{ bootstrap_awx_docker__inventory_dir }}"
    state: directory
    owner: "{{ docker_user_username }}"
    group: "{{ docker_user_group }}"
    mode: "0755"

- name: Create {{ bootstrap_awx_docker__docker_compose_dir }} directory
  ansible.builtin.file:
    path: "{{ bootstrap_awx_docker__docker_compose_dir }}"
    state: directory
    owner: "{{ docker_user_username }}"
    group: "{{ docker_user_group }}"
    mode: "0755"

- name: Create Redis socket directory
  ansible.builtin.file:
    path: "{{ bootstrap_awx_docker__docker_compose_dir }}/redis_socket"
    state: directory
    mode: "0777"
    owner: "{{ docker_user_username }}"
    group: "{{ docker_user_group }}"

- name: Set redis config to other group readable to satisfy redis-server
  ansible.builtin.file:
    path: "{{ bootstrap_awx_docker__docker_compose_dir }}/redis.conf"
    mode: "0777"

- name: Create Docker Compose Configuration
  ansible.builtin.template:
    src: "{{ item.file }}.j2"
    dest: "{{ bootstrap_awx_docker__docker_compose_dir }}/{{ item.file }}"
    mode: "{{ item.mode | d('0600') }}"
    owner: "{{ docker_user_username }}"
    group: "{{ docker_user_group }}"
    backup: true
  loop: "{{ bootstrap_awx_docker__container_config_templates }}"
  register: bootstrap_awx_docker__compose_config

- name: Render SECRET_KEY file
  ansible.builtin.copy:
    content: "{{ bootstrap_awx_docker__secret_key }}"
    dest: "{{ bootstrap_awx_docker__docker_compose_dir }}/SECRET_KEY"
    mode: "0600"
    owner: "{{ docker_user_username }}"
    group: "{{ docker_user_group }}"
  register: bootstrap_awx_docker__secret_key

- name: Start the awx containers
  when: bootstrap_awx_docker__compose_start_containers | bool
  block:
    - name: Display bootstrap_awx_docker__docker_compose_dir
      ansible.builtin.debug:
        var: bootstrap_awx_docker__docker_compose_dir

    - name: Remove AWX containers before migrating postgres so that the old postgres container does not get used # noqa: ignore-errors
      community.docker.docker_compose_v2:
        project_src: "{{ bootstrap_awx_docker__docker_compose_dir }}"
        state: absent
      ignore_errors: true

    - name: Run migrations in task container
      changed_when: false
      ansible.builtin.command: docker-compose run --rm --service-ports task awx-manage migrate --no-input
      args:
        chdir: "{{ bootstrap_awx_docker__docker_compose_dir }}"

    - name: Start the containers
      community.docker.docker_compose_v2:
        project_src: "{{ bootstrap_awx_docker__docker_compose_dir }}"
        restarted: "{{ bootstrap_awx_docker__compose_config is changed or bootstrap_awx_docker__secret_key is changed }}"
        state: present
      register: bootstrap_awx_docker__compose_start

    - name: Update CA trust in awx_web container
      changed_when: false
      ansible.builtin.command: docker exec {{ bootstrap_awx_docker__container_prefix }}_web '/usr/bin/update-ca-trust'
      when: bootstrap_awx_docker__compose_config.changed or bootstrap_awx_docker__compose_start.changed

    - name: Update CA trust in awx_task container
      changed_when: false
      ansible.builtin.command: docker exec {{ bootstrap_awx_docker__container_prefix }}_task '/usr/bin/update-ca-trust'
      when: bootstrap_awx_docker__compose_config.changed or bootstrap_awx_docker__compose_start.changed

    - name: Wait for launch script to create user
      ansible.builtin.wait_for:
        timeout: 10
