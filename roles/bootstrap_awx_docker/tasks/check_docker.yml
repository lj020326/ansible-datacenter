---
- name: bootstrap_awx_docker__postgres_data_dir should be defined
  when: bootstrap_awx_docker__pg_hostname | d('') | length == 0
  ansible.builtin.assert:
    that:
      - bootstrap_awx_docker__postgres_data_dir | d('') | length > 0
    msg: Set the value of 'bootstrap_awx_docker__postgres_data_dir' in the inventory file.

- name: bootstrap_awx_docker__host_port should be defined
  ansible.builtin.assert:
    that:
      - bootstrap_awx_docker__host_port | d('') | length > 0
    msg: Set the value of 'bootstrap_awx_docker__host_port' in the inventory file.
