---
- name: Authenticate with Docker registry if registry password given
  community.docker.docker_login:
    registry: "{{ bootstrap_awx_docker__docker_registry }}"
    username: "{{ bootstrap_awx_docker__docker_registry_username }}"
    password: "{{ bootstrap_awx_docker__docker_registry_password | quote }}"
    reauthorize: true
  when: bootstrap_awx_docker__docker_registry is defined and bootstrap_awx_docker__docker_registry_password is defined
#  delegate_to: localhost

- name: Remove local images to ensure proper push behavior
  block:
    - name: Remove web image
      community.docker.docker_image:
        name: "{{ bootstrap_awx_docker__docker_registry }}/{{ bootstrap_awx_docker__docker_registry_repository }}/{{ bootstrap_awx_docker__web_image }}"
        tag: "{{ bootstrap_awx_docker__version }}"
        state: absent

    - name: Remove task image
      community.docker.docker_image:
        name: "{{ bootstrap_awx_docker__docker_registry }}/{{ bootstrap_awx_docker__docker_registry_repository }}/{{ bootstrap_awx_docker__task_image }}"
        tag: "{{ bootstrap_awx_docker__version }}"
        state: absent
#  delegate_to: localhost

- name: Tag and Push Container Images
  block:
    - name: Tag and push web image to registry
      community.docker.docker_image:
        name: "{{ bootstrap_awx_docker__web_image }}"
        repository: "{{ bootstrap_awx_docker__docker_registry }}/{{ bootstrap_awx_docker__docker_registry_repository }}/{{ bootstrap_awx_docker__web_image }}"
        tag: "{{ item }}"
        push: true
      loop:
        - latest
        - "{{ bootstrap_awx_docker__version }}"

    - name: Tag and push task image to registry
      community.docker.docker_image:
        name: "{{ bootstrap_awx_docker__task_image }}"
        repository: "{{ bootstrap_awx_docker__docker_registry }}/{{ bootstrap_awx_docker__docker_registry_repository }}/{{ bootstrap_awx_docker__task_image }}"
        tag: "{{ item }}"
        push: true
      loop:
        - latest
        - "{{ bootstrap_awx_docker__version }}"
#  delegate_to: localhost

- name: Set full image path for Registry
  ansible.builtin.set_fact:
    bootstrap_awx_docker__web_docker_actual_image: >-
      {{ bootstrap_awx_docker__docker_registry }}/{{ bootstrap_awx_docker__docker_registry_repository }}/{{ bootstrap_awx_docker__web_image }}:{{ bootstrap_awx_docker__version }}
    bootstrap_awx_docker__task_docker_actual_image: >-
      {{ bootstrap_awx_docker__docker_registry }}/{{ bootstrap_awx_docker__docker_registry_repository }}/{{ bootstrap_awx_docker__task_image }}:{{ bootstrap_awx_docker__version }}
