---
- name: Manage AWX Container Images
  when: bootstrap_awx_docker__dockerhub_base is not defined
  block:
    - name: Export Docker web image if it isnt local and there isnt a registry defined
      when: inventory_hostname != "localhost" and bootstrap_awx_docker__docker_registry is not defined
      vars:
        ansible_python_interpreter: "{{ ansible_playbook_python }}"
      community.docker.docker_image:
        name: "{{ bootstrap_awx_docker__web_image }}"
        tag: "{{ bootstrap_awx_docker__version }}"
        archive_path: "{{ bootstrap_awx_docker__local_base_config_path | d('/tmp') }}/{{ bootstrap_awx_docker__web_image }}_{{ bootstrap_awx_docker__version }}.tar"
      delegate_to: localhost

    - name: Export Docker task image if it isnt local and there isnt a registry defined
      when: inventory_hostname != "localhost" and bootstrap_awx_docker__docker_registry is not defined
      vars:
        ansible_python_interpreter: "{{ ansible_playbook_python }}"
      community.docker.docker_image:
        name: "{{ bootstrap_awx_docker__task_image }}"
        tag: "{{ bootstrap_awx_docker__version }}"
        archive_path: "{{ bootstrap_awx_docker__local_base_config_path | d('/tmp') }}/{{ bootstrap_awx_docker__task_image }}_{{ bootstrap_awx_docker__version }}.tar"
      delegate_to: localhost

    - name: Set docker base path
      when: ansible_connection != "local" and bootstrap_awx_docker__docker_registry is not defined
      ansible.builtin.set_fact:
        docker_deploy_base_path: "{{ bootstrap_awx_docker__base_path | d('/tmp') }}/docker_deploy"

    - name: Ensure directory exists
      when: ansible_connection != "local" and bootstrap_awx_docker__docker_registry is not defined
      ansible.builtin.file:
        path: "{{ docker_deploy_base_path }}"
        state: directory
        mode: "0755"

    - name: Copy web image to docker execution
      when: ansible_connection != "local" and bootstrap_awx_docker__docker_registry is not defined
      ansible.builtin.copy:
        src: "{{ bootstrap_awx_docker__local_base_config_path | d('/tmp') }}/{{ bootstrap_awx_docker__web_image }}_{{ bootstrap_awx_docker__version }}.tar"
        dest: "{{ docker_deploy_base_path }}/{{ bootstrap_awx_docker__web_image }}_{{ bootstrap_awx_docker__version }}.tar"
        mode: "0644"

    - name: Copy task image to docker execution
      when: ansible_connection != "local" and bootstrap_awx_docker__docker_registry is not defined
      ansible.builtin.copy:
        src: "{{ bootstrap_awx_docker__local_base_config_path | d('/tmp') }}/{{ bootstrap_awx_docker__task_image }}_{{ bootstrap_awx_docker__version }}.tar"
        dest: "{{ docker_deploy_base_path }}"
        mode: "0644"

    - name: Load web image
      when: ansible_connection != "local" and bootstrap_awx_docker__docker_registry is not defined
      community.docker.docker_image:
        name: "{{ bootstrap_awx_docker__web_image }}"
        tag: "{{ bootstrap_awx_docker__version }}"
        load_path: "{{ docker_deploy_base_path }}/{{ bootstrap_awx_docker__web_image }}_{{ bootstrap_awx_docker__version }}.tar"
        timeout: 300

    - name: Load task image
      when: ansible_connection != "local" and bootstrap_awx_docker__docker_registry is not defined
      community.docker.docker_image:
        name: "{{ bootstrap_awx_docker__task_image }}"
        tag: "{{ bootstrap_awx_docker__version }}"
        load_path: "{{ docker_deploy_base_path }}/{{ bootstrap_awx_docker__task_image }}_{{ bootstrap_awx_docker__version }}.tar"
        timeout: 300

    - name: Set full image path for local install
      when: bootstrap_awx_docker__docker_registry is not defined
      ansible.builtin.set_fact:
        bootstrap_awx_docker__web_docker_actual_image: "{{ bootstrap_awx_docker__web_image }}:{{ bootstrap_awx_docker__version }}"
        bootstrap_awx_docker__task_docker_actual_image: "{{ bootstrap_awx_docker__task_image }}:{{ bootstrap_awx_docker__version }}"

- name: Set DockerHub Image Paths
  ansible.builtin.set_fact:
    bootstrap_awx_docker__web_docker_actual_image: "{{ bootstrap_awx_docker__dockerhub_base }}/{{ bootstrap_awx_docker__web_image }}:{{ bootstrap_awx_docker__version }}"
    bootstrap_awx_docker__task_docker_actual_image: "{{ bootstrap_awx_docker__dockerhub_base }}/{{ bootstrap_awx_docker__task_image }}:{{ bootstrap_awx_docker__version }}"
  when: bootstrap_awx_docker__dockerhub_base is defined
