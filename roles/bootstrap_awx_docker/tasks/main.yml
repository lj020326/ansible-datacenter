- name: display awx image info
  ansible.builtin.debug:
    msg:
      - bootstrap_awx_docker__web_image={{ bootstrap_awx_docker__web_image }}
      - bootstrap_awx_docker__task_image={{ bootstrap_awx_docker__task_image }}
      - bootstrap_awx_docker__version={{ bootstrap_awx_docker__version }}
      - bootstrap_awx_docker__docker_registry={{ bootstrap_awx_docker__docker_registry }}
      - bootstrap_awx_docker__docker_registry_repository={{ bootstrap_awx_docker__docker_registry_repository }}
      - bootstrap_awx_docker__web_docker_actual_image={{ bootstrap_awx_docker__web_docker_actual_image }}
      - bootstrap_awx_docker__task_docker_actual_image={{ bootstrap_awx_docker__task_docker_actual_image }}

- name: Run docker services
  ansible.builtin.import_tasks: compose.yml

- name: Run smoke test
  ansible.builtin.import_tasks: smoke_test.yml
