---
- name: Set global version if not provided
  ansible.builtin.set_fact:
    bootstrap_awx_docker__version: "{{ lookup('file', playbook_dir + '/../VERSION') }}"
  when: bootstrap_awx_docker__version is not defined

- name: Verify awx-logos directory exists for official install
  when: bootstrap_awx_docker__official | d(false) | bool
  no_log: true
  ansible.builtin.stat:
    path: ../../awx-logos
  #  delegate_to: localhost
  register: logosdir
  failed_when: logosdir.stat.isdir is not defined or not logosdir.stat.isdir

- name: Copy logos for inclusion in sdist
  ansible.builtin.copy:
    src: ../../awx-logos/awx/ui/client/assets
    dest: ../awx/ui/client/
    mode: "0644"
  #  delegate_to: localhost
  when: bootstrap_awx_docker__official | d(false) | bool

- name: Set sdist file name
  ansible.builtin.set_fact:
    bootstrap_awx_docker__sdist_file: awx-{{ bootstrap_awx_docker__version }}.tar.gz

- name: AWX Distribution
  ansible.builtin.debug:
    msg: "{{ bootstrap_awx_docker__sdist_file }}"

- name: Stat distribution file
  no_log: true
  ansible.builtin.stat:
    path: ../dist/{{ bootstrap_awx_docker__sdist_file }}
  #  delegate_to: localhost
  register: sdist

- name: Clean distribution # noqa: ignore-errors
  changed_when: false
  ansible.builtin.command: make clean
  args:
    chdir: ..
  ignore_errors: true
  when: not sdist.stat.exists
#  delegate_to: localhost

- name: Build sdist builder image
  community.docker.docker_image:
    build:
      path: "{{ role_path }}/files"
      dockerfile: Dockerfile.sdist
      pull: false
      args:
        http_proxy: "{{ bootstrap_awx_docker__http_proxy | d('') }}"
        https_proxy: "{{ bootstrap_awx_docker__https_proxy | d('') }}"
        no_proxy: "{{ bootstrap_awx_docker__no_proxy | d('') }}"
    name: bootstrap_awx_docker__sdist_builder
    tag: "{{ bootstrap_awx_docker__version }}"
    source: build
    force_source: true
  #  delegate_to: localhost
  when: bootstrap_awx_docker__use_container_for_build | d(true) | bool

- name: Build AWX distribution using container
  community.docker.docker_container:
    env:
      http_proxy: "{{ bootstrap_awx_docker__http_proxy | d('') }}"
      https_proxy: "{{ bootstrap_awx_docker__https_proxy | d('') }}"
      no_proxy: "{{ bootstrap_awx_docker__no_proxy | d('') }}"
    image: bootstrap_awx_docker__sdist_builder:{{ bootstrap_awx_docker__version }}
    name: bootstrap_awx_docker__sdist_builder
    container_default_behavior: compatibility
    #    container_default_behavior: no_defaults
    state: started
    detach: false
    volumes:
      - ../:/awx:Z
  #  delegate_to: localhost
  when: bootstrap_awx_docker__use_container_for_build | d(true) | bool

- name: Build AWX distribution locally
  changed_when: false
  ansible.builtin.command: make sdist
  args:
    chdir: ..
  #  delegate_to: localhost
  when: not bootstrap_awx_docker__use_container_for_build | d(true) | bool

- name: Set docker build base path
  ansible.builtin.set_fact:
    docker_base_path: "{{ bootstrap_awx_docker__local_base_config_path | d('/tmp') }}/docker-image"

- name: Set bootstrap_awx_docker__web image name
  ansible.builtin.set_fact:
    bootstrap_awx_docker__web_image: "{{ bootstrap_awx_docker__web_image | d('bootstrap_awx_docker__web') }}"

- name: Set bootstrap_awx_docker__task image name
  ansible.builtin.set_fact:
    bootstrap_awx_docker__task_image: "{{ bootstrap_awx_docker__task_image | d('bootstrap_awx_docker__task') }}"

- name: Ensure directory exists
  ansible.builtin.file:
    path: "{{ docker_base_path }}"
    state: directory
    mode: "0755"
#  delegate_to: localhost

- name: Stage sdist
  ansible.builtin.copy:
    src: ../dist/{{ bootstrap_awx_docker__sdist_file }}
    dest: "{{ docker_base_path }}/{{ bootstrap_awx_docker__sdist_file }}"
    mode: "0644"
#  delegate_to: localhost

- name: Template web Dockerfile
  ansible.builtin.template:
    src: Dockerfile.j2
    dest: "{{ docker_base_path }}/Dockerfile"
    mode: "0644"
#  delegate_to: localhost

- name: Template task Dockerfile
  ansible.builtin.template:
    src: Dockerfile.task.j2
    dest: "{{ docker_base_path }}/Dockerfile.task"
    mode: "0644"
#  delegate_to: localhost

- name: Stage launch_awx
  ansible.builtin.copy:
    src: launch_awx.sh
    dest: "{{ docker_base_path }}/launch_awx.sh"
    mode: "0700"
#  delegate_to: localhost

- name: Stage launch_awx_task
  ansible.builtin.template:
    src: launch_awx_task.sh.j2
    dest: "{{ docker_base_path }}/launch_awx_task.sh"
    mode: "0755"
#  delegate_to: localhost

- name: Stage google-cloud-sdk.repo
  ansible.builtin.copy:
    src: google-cloud-sdk.repo
    dest: "{{ docker_base_path }}/google-cloud-sdk.repo"
    mode: "0700"
#  delegate_to: localhost

- name: Stage supervisor.conf
  ansible.builtin.copy:
    src: supervisor.conf
    dest: "{{ docker_base_path }}/supervisor.conf"
    mode: "0644"
#  delegate_to: localhost

- name: Stage supervisor_task.conf
  ansible.builtin.copy:
    src: supervisor_task.conf
    dest: "{{ docker_base_path }}/supervisor_task.conf"
    mode: "0644"
#  delegate_to: localhost

- name: Stage settings.py
  ansible.builtin.copy:
    src: settings.py
    dest: "{{ docker_base_path }}/settings.py"
    mode: "0644"
#  delegate_to: localhost

- name: Stage requirements
  ansible.builtin.copy:
    #    src: ../requirements/
    src: requirements/
    dest: "{{ docker_base_path }}/requirements"
    mode: "0644"
#  delegate_to: localhost

- name: Stage config watcher
  ansible.builtin.copy:
    #    src: ../tools/scripts/config-watcher
    src: tools/scripts/config-watcher
    dest: "{{ docker_base_path }}/config-watcher"
    mode: "0644"
#  delegate_to: localhost

- name: Stage Makefile
  ansible.builtin.copy:
    #    src: ../Makefile
    src: Makefile
    dest: "{{ docker_base_path }}/Makefile"
    mode: "0644"
#  delegate_to: localhost

- name: Build base web image
  community.docker.docker_image:
    build:
      path: "{{ docker_base_path }}"
      dockerfile: Dockerfile
      pull: false
      args:
        http_proxy: "{{ bootstrap_awx_docker__http_proxy | d('') }}"
        https_proxy: "{{ bootstrap_awx_docker__https_proxy | d('') }}"
        no_proxy: "{{ bootstrap_awx_docker__no_proxy | d('') }}"
    name: "{{ bootstrap_awx_docker__web_image }}"
    tag: "{{ bootstrap_awx_docker__version }}"
    source: build
    force_source: true
#  delegate_to: localhost

- name: Build base task image
  community.docker.docker_image:
    build:
      path: "{{ docker_base_path }}"
      dockerfile: Dockerfile.task
      pull: false
      args:
        http_proxy: "{{ bootstrap_awx_docker__http_proxy | d('') }}"
        https_proxy: "{{ bootstrap_awx_docker__https_proxy | d('') }}"
        no_proxy: "{{ bootstrap_awx_docker__no_proxy | d('') }}"
    name: "{{ bootstrap_awx_docker__task_image }}"
    tag: "{{ bootstrap_awx_docker__version }}"
    source: build
    force_source: true
#  delegate_to: localhost

- name: Tag task and web images as latest
  changed_when: false
  ansible.builtin.command: docker tag {{ item }}:{{ bootstrap_awx_docker__version }} {{ item }}:latest
  #  delegate_to: localhost
  loop:
    - "{{ bootstrap_awx_docker__task_image }}"
    - "{{ bootstrap_awx_docker__web_image }}"

- name: Clean docker base directory
  ansible.builtin.file:
    path: "{{ docker_base_path }}"
    state: absent
  when: cleanup_docker_base | d(true) | bool
#  delegate_to: localhost
