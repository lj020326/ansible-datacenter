---

bootstrap_awx_docker__docker_registry: registry.example.int:5000
bootstrap_awx_docker__docker_registry_username: registryuser
bootstrap_awx_docker__docker_registry_password: password

#bootstrap_awx_docker__version: "{{ lookup('file', playbook_dir + '/../VERSION') }}"
#bootstrap_awx_docker__web_image: "awx_web"
#bootstrap_awx_docker__task_image: "awx_task"

bootstrap_awx_docker__version: 20.1.0
bootstrap_awx_docker__web_image: awx
bootstrap_awx_docker__task_image: awx

bootstrap_awx_docker__web_docker_actual_image: "{{ bootstrap_awx_docker__docker_registry }}/{{ bootstrap_awx_docker__docker_registry_repository }}/{{ bootstrap_awx_docker__web_image }}:{{ bootstrap_awx_docker__version }}"
bootstrap_awx_docker__task_docker_actual_image: "{{ bootstrap_awx_docker__docker_registry }}/{{ bootstrap_awx_docker__docker_registry_repository }}/{{ bootstrap_awx_docker__task_image }}:{{ bootstrap_awx_docker__version }}"

bootstrap_awx_docker__inventory_dir: ~/.awx

bootstrap_awx_docker__redis_image: redis

#bootstrap_awx_docker__postgresql_version: "10"
bootstrap_awx_docker__postgresql_version: "14.2"
bootstrap_awx_docker__postgresql_image: postgres:{{bootstrap_awx_docker__postgresql_version}}

bootstrap_awx_docker__memcached_image: memcached
bootstrap_awx_docker__memcached_version: alpine
bootstrap_awx_docker__memcached_hostname: memcached
bootstrap_awx_docker__memcached_port: "11211"

bootstrap_awx_docker__compose_start_containers: true

## bootstrap_awx_docker__image_build

## inventory vars

# Remove these lines if you want to run a local image build
# Otherwise the setup playbook will install the official Ansible images. Versions may
# be selected based on: latest, 1, 1.0, 1.0.0, 1.0.0.123
# by default the base will be used to search for ansible/awx_web and ansible/awx_task
#bootstrap_awx_docker__dockerhub_base: ansible

# Openshift Install
# Will need to set -e openshift_password=developer -e docker_registry_password=$(oc whoami -t)
#           or set -e openshift_token=TOKEN
# bootstrap_awx_docker__openshift_host: 127.0.0.1:8443
# bootstrap_awx_docker__openshift_project: awx
# bootstrap_awx_docker__openshift_user: developer
# bootstrap_awx_docker__openshift_skip_tls_verify: False
# bootstrap_awx_docker__openshift_pg_emptydir: True

# Kubernetes Install
# bootstrap_awx_docker__bootstrap_kubernetes__context: test-cluster
# bootstrap_awx_docker__bootstrap_kubernetes__namespace: awx
# Optional Kubernetes Variables
# bootstrap_awx_docker__pg_image_registry: docker.io
# bootstrap_awx_docker__pg_serviceaccount: awx
# bootstrap_awx_docker__pg_volume_capacity: 5
# bootstrap_awx_docker__pg_persistence_storageClass: StorageClassName
# bootstrap_awx_docker__pg_cpu_limit: 1000
# bootstrap_awx_docker__pg_mem_limit: 2

# Kubernetes Ingress Configuration
# You can use the variables below to configure Kubernetes Ingress
# Set hostname
# bootstrap_awx_docker__bootstrap_kubernetes__ingress_hostname: awx.example.org
# Add annotations. The example below shows an annotation to be used with Traefik but other Ingress controllers are also supported
# bootstrap_awx_docker__bootstrap_kubernetes__ingress_annotations: {'kubernetes.io/ingress.class': 'traefik', 'traefik.ingress.kubernetes.io/redirect-entry-point': 'https'}
# Specify a secret for TLS termination
# bootstrap_awx_docker__bootstrap_kubernetes__ingress_tls_secret: awx-cert

# Kubernetes and Openshift Install Resource Requests
# These are the request and limit values for a pod's container for task/web/redis/memcached/management.
# The total amount of requested resources for a pod is the sum of all
# resources requested by all containers in the pod
# A cpu_request of 1500 is 1.5 cores for the container to start out with.
# A cpu_limit defines the maximum cores that that container can reserve.
# A mem_request of 2 is for 2 gigabytes of memory for the container
# A mem_limit defines the maximum memory that that container can reserve.
# Default values for these entries can be found in ./roles/kubernetes/defaults/main.yml
# bootstrap_awx_docker__task_cpu_request: 1500
# bootstrap_awx_docker__task_mem_request: 2
# bootstrap_awx_docker__task_cpu_limit: 2000
# bootstrap_awx_docker__task_mem_limit: 4
# bootstrap_awx_docker__web_cpu_limit: 1000
# bootstrap_awx_docker__web_mem_limit: 2
# bootstrap_awx_docker__redis_cpu_limit: 1000
# bootstrap_awx_docker__redis_mem_limit: 3
# bootstrap_awx_docker__memcached_cpu_limit: 1000
# bootstrap_awx_docker__memcached_mem_limit: 2
# bootstrap_awx_docker__management_cpu_limit: 2000
# bootstrap_awx_docker__management_mem_limit: 2

# Common Docker parameters
bootstrap_awx_docker__task_hostname: awx
bootstrap_awx_docker__web_hostname: awxweb
bootstrap_awx_docker__postgres_data_dir: ~/.awx/pgdocker
bootstrap_awx_docker__host_port: 80
bootstrap_awx_docker__host_port_ssl: 443
#bootstrap_awx_docker__ssl_certificate:
bootstrap_awx_docker__docker_compose_dir: ~/.awx/awxcompose

bootstrap_awx_docker__container_prefix: awx

# Required for Openshift when building the image on your own
# Optional for Openshift if using Dockerhub or another prebuilt registry
# Required for Docker Compose Install if building the image on your own
# Optional for Docker Compose Install if using Dockerhub or another prebuilt registry
# Define if you want the image pushed to a registry. The container definition will also use these images
# bootstrap_awx_docker__docker_registry: 172.30.1.1:5000
# bootstrap_awx_docker__docker_registry_repository: awx
# bootstrap_awx_docker__docker_registry_username: developer
bootstrap_awx_docker__docker_registry_repository: awx

# Set bootstrap_awx_docker__pg_hostname if you have an external postgres server, otherwise
# a new postgres service will be created
# bootstrap_awx_docker__pg_hostname: postgresql
bootstrap_awx_docker__pg_username: awx
# bootstrap_awx_docker__pg_password should be random 10 character alphanumeric string, when postgresql is running on kubernetes
# NB: it's a limitation of the "official" postgres helm chart
bootstrap_awx_docker__pg_password: pgpass
bootstrap_awx_docker__pg_database: awx
bootstrap_awx_docker__pg_port: 5432
#bootstrap_awx_docker__pg_sslmode: require

### ref: https://debugthis.dev/posts/2020/04/setting-up-ansible-awx-using-a-docker-environment-part-2-the-docker-compose-approach/
#bootstrap_awx_docker__rabbitmq_image: "ansible/awx_rabbitmq:3.7.4"
#bootstrap_awx_docker__rabbitmq_username: guest
#bootstrap_awx_docker__rabbitmq_password: awxpass
#bootstrap_awx_docker__rabbitmq_host: rabbitmq
#bootstrap_awx_docker__rabbitmq_port: 5672
#bootstrap_awx_docker__rabbitmq_vhost: "awx"
#bootstrap_awx_docker__rabbitmq_erlang_cookie: cookiemonster

# The following variable is only required when using the provided
# containerized postgres deployment on OpenShift
# bootstrap_awx_docker__pg_admin_password: postgrespass

# Use a local distribution build container image for building the AWX package
# This is helpful if you don't want to bother installing the build-time dependencies as
# it is taken care of already.
# NOTE: IMPORTANT: If you are running a mininshift install, using this container might not work
#                  if you are using certain drivers like KVM where the source tree can't be mapped
#                  into the build container.
#                  Thus this setting must be set to False which will trigger a local build. To view the
#                  typical dependencies that you might need to install see:
#                  installer/image_build/files/Dockerfile.sdist
# bootstrap_awx_docker__use_container_for_build: true

# This will create or update a default admin (superuser) account in AWX, if not provided
# then these default values are used
bootstrap_awx_docker__admin_user: admin
bootstrap_awx_docker__admin_password: password

# Whether or not to create preload data for demonstration purposes
bootstrap_awx_docker__create_preload_data: true

# AWX Secret key
# It's *very* important that this stay the same between upgrades or you will lose the ability to decrypt
# your credentials
bootstrap_awx_docker__secret_key: awxsecret

# Build AWX with official logos
# Requires cloning awx-logos repo as a sibling of this project.
# Review the trademark guidelines at https://github.com/ansible/awx-logos/blob/master/TRADEMARKS.md
# bootstrap_awx_docker__official: false

# Proxy
#bootstrap_awx_docker__http_proxy: http://proxy:3128
#bootstrap_awx_docker__https_proxy: http://proxy:3128
#bootstrap_awx_docker__no_proxy: mycorp.org

# Container networking configuration
# Set the awx_task and awx_web containers' search domain(s)
#bootstrap_awx_docker__container_search_domains: example.com,ansible.com
# Alternate DNS servers
#bootstrap_awx_docker__alternate_dns_servers: "10.1.2.3,10.2.3.4"

# AWX project data folder. If you need access to the location where AWX stores the projects
# it manages from the docker host, you can set this to turn it into a volume for the container.
#bootstrap_awx_docker__project_data_dir: /var/lib/awx/projects

# AWX custom virtual environment folder. Only usable for local install.
#bootstrap_awx_docker__custom_venv_dir: /opt/my-envs/

# CA Trust directory. If you need to provide custom CA certificates, supplying
# this variable causes this directory on the host to be bind mounted over
# /etc/pki/ca-trust in the awx_task and awx_web containers.
#bootstrap_awx_docker__ca_trust_dir: /etc/pki/ca-trust/source/anchors

# Include /etc/nginx/awx_extra.conf
# Note the use of glob pattern for nginx
# which makes include "optional" - i.e. not fail
# if file is absent
#bootstrap_awx_docker__extra_nginx_include="/etc/nginx/awx_extra[.]conf"

bootstrap_awx_docker__container_config_templates:
  - file: environment.sh
    mode: "0600"
  - file: credentials.py
    mode: "0600"
  - file: docker-compose.yml
    mode: "0600"
  - file: nginx.conf
    mode: "0600"
  - file: redis.conf
    mode: "0664"
#  - file: settings.py
#    mode: "0664"

bootstrap_awx_docker__web_volumes:
  - supervisor-socket:/var/run/supervisor
  - rsyslog-socket:/var/run/awx-rsyslog/
  - rsyslog-config:/var/lib/awx/rsyslog/
  - "{{ bootstrap_awx_docker__docker_compose_dir }}/SECRET_KEY:/etc/tower/SECRET_KEY"
  - "{{ bootstrap_awx_docker__docker_compose_dir }}/environment.sh:/etc/tower/conf.d/environment.sh"
  - "{{ bootstrap_awx_docker__docker_compose_dir }}/credentials.py:/etc/tower/conf.d/credentials.py"
  #      - "{{ bootstrap_awx_docker__docker_compose_dir }}/settings.py:/etc/tower/conf.d/settings.py"
  - "{{ bootstrap_awx_docker__docker_compose_dir }}/nginx.conf:/etc/nginx/nginx.conf:ro"
  - "{{ bootstrap_awx_docker__docker_compose_dir }}/redis_socket:/var/run/redis/:rw"

bootstrap_awx_docker__task_volumes:
  - supervisor-socket:/var/run/supervisor
  - rsyslog-socket:/var/run/awx-rsyslog/
  - rsyslog-config:/var/lib/awx/rsyslog/
  - "{{ bootstrap_awx_docker__docker_compose_dir }}/SECRET_KEY:/etc/tower/SECRET_KEY"
  - "{{ bootstrap_awx_docker__docker_compose_dir }}/environment.sh:/etc/tower/conf.d/environment.sh"
  - "{{ bootstrap_awx_docker__docker_compose_dir }}/credentials.py:/etc/tower/conf.d/credentials.py"
  - "{{ bootstrap_awx_docker__docker_compose_dir }}/redis_socket:/var/run/redis/:rw"
