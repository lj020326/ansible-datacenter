---

__bootstrap_linux_package__preserve_nvidia_repos: true
__bootstrap_linux_package__reset_sources_default: false

__bootstrap_linux_package__package_source_dir_default: /etc/apt/sources.list.d

__bootstrap_linux_package__package_list_default:
  - build-essential
  - python3-dev
  - python3-venv
  - git
  - curl
  - wget
  - htop
  - tmux
  - screen
  - nvtop
  - nvidia-container-toolkit
  - jq
  - nfs-common
  - net-tools
  - dnsutils
  # cuda is already provided by DGX repos - avoid conflict
  # ollama we'll install manually or via script later
