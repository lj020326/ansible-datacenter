---
- name: Converge
  hosts: all
  become: true

  vars:
    bootstrap_nodejs__install_npm_user: root
    bootstrap_nodejs__npm_config_prefix: /root/.npm-global
    bootstrap_nodejs__npm_config_unsafe_perm: "true"
    bootstrap_nodejs__npm_global_packages:
      - node-sass
      - name: jslint
        version: 0.12.0
      - name: yo

  pre_tasks:
    - name: Update apt cache.
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 600
      when: ansible_facts['os_family'] == 'Debian'

  roles:
    - role: bootstrap_nodejs
