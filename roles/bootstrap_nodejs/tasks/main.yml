---

- name: Load os-version specific variables
  ansible.builtin.include_vars: "{{ lookup('first_found', __os_lookup_params) }}"
  vars:
    __os_lookup_params:
      files:
        - "{{ ansible_facts['distribution'] | lower }}-{{ ansible_facts['distribution_version'] | lower }}.yml"
        - "{{ ansible_facts['distribution'] | lower }}-{{ ansible_facts['distribution'] | lower }}.yml"
        - "{{ ansible_facts['distribution'] | lower }}.yml"
        - "{{ ansible_facts['os_family'] | lower }}.yml"
      paths:
        - "{{ role_path }}/vars"

- name: Run setup-{{ ansible_facts['os_family'] }}.yml
  ansible.builtin.include_tasks: "setup-{{ ansible_facts['os_family'] | lower }}.yml"

- name: Define bootstrap_nodejs__install_npm_user
  ansible.builtin.set_fact:
    bootstrap_nodejs__install_npm_user: "{{ ansible_user | default(lookup('env', 'USER')) }}"
  when: bootstrap_nodejs__install_npm_user is not defined

- name: Create npm global directory
  ansible.builtin.file:
    path: "{{ bootstrap_nodejs__npm_config_prefix }}"
    owner: "{{ bootstrap_nodejs__install_npm_user }}"
    group: "{{ bootstrap_nodejs__install_npm_user }}"
    state: directory
    mode: "0755"

- name: Add bootstrap_nodejs__npm_config_prefix bin directory to global $PATH.
  ansible.builtin.template:
    src: npm.sh.j2
    dest: /etc/profile.d/npm.sh
    mode: "0644"
  when: bootstrap_nodejs__generate_etc_profile | bool

- name: Ensure npm global packages are installed.
  community.general.npm:
    name: "{{ item.name | d(item) }}"
    version: "{{ item.version | d('latest') }}"
    global: true
    state: latest
  environment:
    NPM_CONFIG_PREFIX: "{{ bootstrap_nodejs__npm_config_prefix }}"
    NODE_PATH: "{{ bootstrap_nodejs__npm_config_prefix }}/lib/node_modules"
    NPM_CONFIG_UNSAFE_PERM: "{{ bootstrap_nodejs__npm_config_unsafe_perm }}"
  loop: "{{ bootstrap_nodejs__npm_global_packages }}"

- name: Install packages defined in a given package.json.
  community.general.npm:
    path: "{{ bootstrap_nodejs__package_json_path }}"
  when: bootstrap_nodejs__package_json_path | d('') | length > 0
