---
- name: Install systemd service files
  when:
    - bootstrap_sshd__install_service | bool
    - ansible_facts['service_mgr'] == 'systemd' or (ansible_facts['os_family'] == 'RedHat' and ansible_facts['distribution_major_version'] == '7')
  block:
    - name: Install service unit file
      ansible.builtin.template:
        src: "{{ bootstrap_sshd__service_template_service }}"
        dest: /etc/systemd/system/{{ bootstrap_sshd__service }}.service
        owner: root
        group: root
        mode: "0644"
      notify: Reload_sshd

    - name: Install instanced service unit file
      ansible.builtin.template:
        src: "{{ bootstrap_sshd__service_template_at_service }}"
        dest: /etc/systemd/system/{{ bootstrap_sshd__service }}@.service
        owner: root
        group: root
        mode: "0644"
      notify: Reload_sshd
      when:
        - __bootstrap_sshd__socket_accept | bool

    - name: Install socket unit file
      ansible.builtin.template:
        src: "{{ bootstrap_sshd__service_template_socket }}"
        dest: /etc/systemd/system/{{ bootstrap_sshd__service }}.socket
        owner: root
        group: root
        mode: "0644"
      notify: Reload_sshd

- name: Service enabled and running
  ansible.builtin.service:
    name: "{{ bootstrap_sshd__service }}"
    enabled: true
    state: started
  when:
    - bootstrap_sshd__manage_service | bool
    - ansible_facts['virtualization_type'] | d(None) not in __bootstrap_sshd__skip_virt_env
    - ansible_connection != 'chroot'

# Due to ansible bug 21026, cannot use service module on RHEL 7
- name: Enable service in chroot
  ansible.builtin.command: systemctl enable {{ bootstrap_sshd__service }} # noqa command-instead-of-module
  when:
    - ansible_connection == 'chroot'
    - ansible_facts['os_family'] == 'RedHat'
    - ansible_facts['distribution_major_version'] | int >= 7
  changed_when: true
