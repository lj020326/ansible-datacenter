---
- name: Configure Trusted user CA Keys
  vars:
    # The explicit to_json filter is needed for Python 2 compatibility
    __bootstrap_sshd__trustedusercakeys_from_config: >-
      {% if bootstrap_sshd__TrustedUserCAKeys is defined %}
        {{ bootstrap_sshd__TrustedUserCAKeys | to_json }}
      {% else %}
        {{ sshd['TrustedUserCAKeys'] | to_json }}
      {% endif %}
  block:
    - name: Create Trusted user CA Keys directory
      ansible.builtin.file:
        path: "{{ (__bootstrap_sshd__trustedusercakeys_from_config | from_json) | dirname }}"
        state: directory
        owner: "{{ bootstrap_sshd__trustedusercakeys_directory_owner }}"
        group: "{{ bootstrap_sshd__trustedusercakeys_directory_group }}"
        mode: "{{ bootstrap_sshd__trustedusercakeys_directory_mode }}"

    - name: Copy Trusted user CA Keys
      ansible.builtin.template:
        src: trusted-user-ca-keys.pub.j2
        dest: "{{ __bootstrap_sshd__trustedusercakeys_from_config | from_json }}"
        owner: "{{ bootstrap_sshd__trustedusercakeys_file_owner }}"
        group: "{{ bootstrap_sshd__trustedusercakeys_file_group }}"
        mode: "{{ bootstrap_sshd__trustedusercakeys_file_mode }}"

- name: Configure Principals
  vars:
    # The explicit to_json filter is needed for Python 2 compatibility
    __bootstrap_sshd__authorizedprincipalsfile_from_config: >-
      {% if bootstrap_sshd__AuthorizedPrincipalsFile is defined %}
        {{ bootstrap_sshd__AuthorizedPrincipalsFile | to_json }}
      {% else %}
        {{ sshd['AuthorizedPrincipalsFile'] | to_json }}
      {% endif %}
  when: bootstrap_sshd__principals != {}
  block:
    - name: Create Principals directory
      ansible.builtin.file:
        path: "{{ (__bootstrap_sshd__authorizedprincipalsfile_from_config | from_json) | dirname }}"
        state: directory
        owner: "{{ bootstrap_sshd__authorizedprincipals_directory_owner }}"
        group: "{{ bootstrap_sshd__authorizedprincipals_directory_group }}"
        mode: "{{ bootstrap_sshd__authorizedprincipals_directory_mode }}"

    - name: Copy Principals files
      ansible.builtin.template:
        src: auth_principals.j2
        dest: "{{ (__bootstrap_sshd__authorizedprincipalsfile_from_config | from_json) | dirname }}/{{ item.key }}"
        owner: "{{ bootstrap_sshd__authorizedprincipals_file_owner }}"
        group: "{{ bootstrap_sshd__authorizedprincipals_file_group }}"
        mode: "{{ bootstrap_sshd__authorizedprincipals_file_mode }}"
      with_dict: "{{ bootstrap_sshd__principals }}"
