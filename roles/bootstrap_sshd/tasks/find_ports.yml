---
- name: Find the port the ssh service is going to use
  vars:
    # This mimics the macro body_option() in sshd_config.j2
    # The explicit to_json filter is needed for Python 2 compatibility
    __bootstrap_sshd__ports_from_config_tmp: >-
      {% if bootstrap_sshd__Port is defined %}
        {{ bootstrap_sshd__Port | to_json }}
      {% elif sshd['Port'] is defined %}
        {{ sshd['Port'] | to_json }}
      {% elif __bootstrap_sshd__defaults['Port'] is defined and not bootstrap_sshd__skip_defaults %}
        {{ __bootstrap_sshd__defaults['Port'] | to_json }}
      {% else %}
        {{ [22] | to_json }}
      {% endif %}
  ansible.builtin.set_fact:
    __bootstrap_sshd__ports_from_config: >-
      {% if __bootstrap_sshd__ports_from_config_tmp | from_json is string or __bootstrap_sshd__ports_from_config_tmp | from_json is number %}
        {{ [__bootstrap_sshd__ports_from_config_tmp | from_json] | to_json }}
      {% else %}
        {{ __bootstrap_sshd__ports_from_config_tmp }}
      {% endif %}
  when:
    - bootstrap_sshd__manage_firewall | bool or bootstrap_sshd__manage_selinux | bool
    - ansible_facts['os_family'] == 'RedHat'
    - ansible_facts['virtualization_type'] | d(None) not in __bootstrap_sshd__skip_virt_env
