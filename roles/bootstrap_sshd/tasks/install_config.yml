---
- name: Create a directory for drop-in configuration snippets
  when:
    - bootstrap_sshd__main_config_file is not none
    - bootstrap_sshd__config_file | dirname == bootstrap_sshd__main_config_file ~ '.d'
  ansible.builtin.file:
    path: "{{ bootstrap_sshd__config_file | dirname }}"
    state: directory
    mode: "{{ bootstrap_sshd__drop_in_dir_mode }}"

- name: Display bootstrap_sshd__config_file
  ansible.builtin.debug:
    var: bootstrap_sshd__config_file

- name: Display bootstrap_sshd__test_hostkey
  ansible.builtin.debug:
    var: bootstrap_sshd__test_hostkey | d('')

- name: Display __bootstrap_sshd__defaults
  ansible.builtin.debug:
    var: __bootstrap_sshd__defaults

- name: Display final sshd config before validation
  when: ansible_verbosity > 0
  ansible.builtin.debug:
    msg: "{{ lookup('template', 'sshd_config.j2') }}"

- name: Create the complete configuration file
  ansible.builtin.template:
    src: sshd_config.j2
    dest: "{{ bootstrap_sshd__config_file }}"
    owner: "{{ bootstrap_sshd__config_owner }}"
    group: "{{ bootstrap_sshd__config_group }}"
    mode: "{{ bootstrap_sshd__config_mode }}"
    validate: >-
      {% if not __bootstrap_sshd__supports_validate %}
        true %s
      {% elif bootstrap_sshd__test_hostkey is defined and bootstrap_sshd__test_hostkey.path is defined %}
        {{ bootstrap_sshd__binary }} -t -f %s -h {{ bootstrap_sshd__test_hostkey.path }}/rsa_key
      {% else %}
        {{ bootstrap_sshd__binary }} -t -f %s
      {% endif %}
    backup: "{{ bootstrap_sshd__backup }}"
  notify: Reload_sshd

- name: Make sure the include path is present in the main sshd_config
  when:
    - bootstrap_sshd__main_config_file is not none
    - bootstrap_sshd__config_file | dirname == bootstrap_sshd__main_config_file ~ '.d'
  ansible.builtin.lineinfile:
    insertbefore: BOF
    line: Include {{ bootstrap_sshd__config_file | dirname }}/*.conf
    path: "{{ bootstrap_sshd__main_config_file }}"
    owner: "{{ bootstrap_sshd__config_owner }}"
    group: "{{ bootstrap_sshd__config_group }}"
    mode: "{{ bootstrap_sshd__config_mode }}"
    validate: >-
      {% if not __bootstrap_sshd__supports_validate %}
        true %s
      {% elif bootstrap_sshd__test_hostkey is defined and bootstrap_sshd__test_hostkey.path is defined %}
        {{ bootstrap_sshd__binary }} -t -f %s -h {{ bootstrap_sshd__test_hostkey.path }}/rsa_key
      {% else %}
        {{ bootstrap_sshd__binary }} -t -f %s
      {% endif %}
    backup: "{{ bootstrap_sshd__backup }}"
  notify: Reload_sshd
