---
- name: Ensure the custom ports are configured in selinux
  ansible.builtin.include_role:
    name: fedora.linux_system_roles.selinux
  vars:
    selinux_ports:
      - ports: "{{ sshd_item }}"
        proto: tcp
        setype: ssh_port_t
        state: present
        local: true
  loop: "{{ __bootstrap_sshd__ports_from_config | from_json | d([], true) }}"
  loop_control:
    loop_var: sshd_item # avoid conflicts with the selinux loops
  when:
    - __bootstrap_sshd__ports_from_config | from_json != [22]
