---
- name: Update configuration file snippet
  vars:
    bootstrap_sshd__skip_defaults: true
  ansible.builtin.blockinfile:
    path: "{{ bootstrap_sshd__config_file }}"
    owner: "{{ bootstrap_sshd__config_owner }}"
    group: "{{ bootstrap_sshd__config_group }}"
    mode: "{{ bootstrap_sshd__config_mode }}"
    block: |
      {{ __bootstrap_sshd__compat_match_all }}
      {{ lookup('template', 'sshd_config_snippet.j2') }}
    create: true
    marker: "# {mark} sshd system role managed block: namespace {{ bootstrap_sshd__config_namespace }}"
    validate: >-
      {% if not __bootstrap_sshd__supports_validate %}
        true %s
      {% elif bootstrap_sshd__test_hostkey is defined and bootstrap_sshd__test_hostkey.path is defined %}
        {{ bootstrap_sshd__binary }} -t -f %s -h {{ bootstrap_sshd__test_hostkey.path }}/rsa_key
      {% else %}
        {{ bootstrap_sshd__binary }} -t -f %s
      {% endif %}
    backup: "{{ bootstrap_sshd__backup }}"
  notify: Reload_sshd
