---
__bootstrap_sshd__packages:
  - openssh
  - openssh-server
__bootstrap_sshd__sftp_server: /usr/libexec/openssh/sftp-server
__bootstrap_sshd__defaults:
  HostKey:
    - /etc/ssh/ssh_host_rsa_key
  Protocol: 2
  SyslogFacility: AUTHPRIV
  PasswordAuthentication: true
  ChallengeResponseAuthentication: false
  GSSAPIAuthentication: true
  GSSAPICleanupCredentials: true
  UsePAM: true
  AcceptEnv:
    - LANG LC_CTYPE LC_NUMERIC LC_TIME LC_COLLATE LC_MONETARY LC_MESSAGES
    - LC_PAPER LC_NAME LC_ADDRESS LC_TELEPHONE LC_MEASUREMENT
    - LC_IDENTIFICATION LC_ALL LANGUAGE
    - XMODIFIERS
  X11Forwarding: true
  Subsystem: sftp {{ __bootstrap_sshd__sftp_server }}
__bootstrap_sshd__os_supported: true
__bootstrap_sshd__sysconfig_supports_use_strong_rng: true
__bootstrap_sshd__compat_match_all: Match address *
