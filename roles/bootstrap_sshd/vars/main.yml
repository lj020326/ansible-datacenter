---
__bootstrap_sshd__config_file: /etc/ssh/sshd_config
__bootstrap_sshd__config_owner: root
__bootstrap_sshd__config_group: root
__bootstrap_sshd__config_mode: "0600"
__bootstrap_sshd__hostkey_owner: root
__bootstrap_sshd__hostkey_group: root
__bootstrap_sshd__hostkey_mode: "0600"
__bootstrap_sshd__trustedusercakeys_directory_owner: root
__bootstrap_sshd__trustedusercakeys_directory_group: root
__bootstrap_sshd__trustedusercakeys_directory_mode: "0755"
__bootstrap_sshd__trustedusercakeys_file_owner: root
__bootstrap_sshd__trustedusercakeys_file_group: root
__bootstrap_sshd__trustedusercakeys_file_mode: "0640"
__bootstrap_sshd__authorizedprincipals_directory_owner: root
__bootstrap_sshd__authorizedprincipals_directory_group: root
__bootstrap_sshd__authorizedprincipals_directory_mode: "0755"
__bootstrap_sshd__authorizedprincipals_file_owner: root
__bootstrap_sshd__authorizedprincipals_file_group: root
__bootstrap_sshd__authorizedprincipals_file_mode: "0644"
# The OpenSSH 5.3 in RHEL6 does not support "Match all" so we need a workaround
__bootstrap_sshd__compat_match_all: Match all
# The hostkeys not supported in FIPS mode, if applicable
__bootstrap_sshd__hostkeys_nofips: []
__bootstrap_sshd__required_facts:
  - distribution
  - distribution_major_version
  - os_family

__bootstrap_sshd__skip_virt_env:
  - docker
  - podman
  - container
  - containerd
  - VirtualPC

__bootstrap_sshd__binary: /usr/sbin/sshd
__bootstrap_sshd__service: sshd
__bootstrap_sshd__sftp_server: /usr/lib/openssh/sftp-server

__bootstrap_sshd__defaults: {}
__bootstrap_sshd__os_supported: false
__bootstrap_sshd__sysconfig_supports_crypto_policy: false
__bootstrap_sshd__sysconfig_supports_use_strong_rng: false

# The runtime directory is used by systemd to provide termoporary directory for the service
# This is used as a RuntimeDirectory= option in the service file and it needs to exist
# before running sshd for example in the validate mode.
__bootstrap_sshd__runtime_directory:
__bootstrap_sshd__runtime_directory_mode: "0755"

# this is the path to the main sshd_config which is checked for Include directive when
# drop-in directory is used
__bootstrap_sshd__main_config_file:
__bootstrap_sshd__drop_in_dir_mode: "0755"

# The list of hostkeys to check when there are none listed in configuration file.
# This is usually the case when the selection is up to the OpenSSH defaults or
# drop-in directory is used.
__bootstrap_sshd__verify_hostkeys_default: []
# This switch can control if the validate step is supported by the target OS.
# This is useful for very old OpenSSH or for tests that generate invalid configurations
__bootstrap_sshd__supports_validate: true

# The path to an environment file for the SSHD service
__bootstrap_sshd__environment_file:
__bootstrap_sshd__environment_file_mandatory: false

# The variable name we are passing from the environment file as an argument to the sshd
__bootstrap_sshd__environment_variable: $OPTIONS

# The systemd targets that need to be up before starting the service.
# The `network.target` is included by default in the main sshd.service (not the instantiated one)
__bootstrap_sshd__service_after:
# The systemd service name alias
__bootstrap_sshd__service_alias:
# The systemd service wants directive
__bootstrap_sshd__service_wants:
# The systemd service RestartSec directive
__bootstrap_sshd__service_restart_timeout:
# The systemd socket file does not accept the connection
__bootstrap_sshd__socket_accept: true

# Boolean to control if the systemd socket can be bound to non-local IP addresses
__bootstrap_sshd__socket_freebind:
# Space separated list of service names that this socket is required by
__bootstrap_sshd__socket_required_by:
