---
# There is no package manager in CoreOS
__bootstrap_sshd__packages: []
__bootstrap_sshd__service: sshd
__bootstrap_sshd__sftp_server: internal-sftp
__bootstrap_sshd__defaults:
  Subsystem: sftp {{ __bootstrap_sshd__sftp_server }}
  ClientAliveInterval: 180
  UseDNS: false
  UsePAM: true
  PrintLastLog: false
  PrintMotd: false
__bootstrap_sshd__os_supported: true
