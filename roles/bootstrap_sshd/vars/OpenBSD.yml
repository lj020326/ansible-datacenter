---
__bootstrap_sshd__config_group: wheel
__bootstrap_sshd__config_mode: "0600"
__bootstrap_sshd__sftp_server: /usr/libexec/sftp-server
__bootstrap_sshd__defaults:
  AuthorizedKeysFile: .ssh/authorized_keys
  Subsystem: sftp {{ __bootstrap_sshd__sftp_server }}
__bootstrap_sshd__os_supported: true
__bootstrap_sshd__manage_var_run: false
__bootstrap_sshd__packages: []
