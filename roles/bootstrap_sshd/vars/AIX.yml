---
__bootstrap_sshd__config_mode: "0644"
# sshd is not installed by yum / AIX toolbox for Linux.
# You'll need to manually install them using AIX Web Download Packs.
__bootstrap_sshd__packages: []
__bootstrap_sshd__sftp_server: /usr/sbin/sftp-server
__bootstrap_sshd__config_group: system
__bootstrap_sshd__defaults:
  Subsystem: sftp {{ __bootstrap_sshd__sftp_server }}
__bootstrap_sshd__os_supported: true

sshd_install_service: false
sshd_manage_service: false
sshd_allow_reload: true
