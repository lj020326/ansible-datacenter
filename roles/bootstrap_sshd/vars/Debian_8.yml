---
__bootstrap_sshd__service: ssh
__bootstrap_sshd__packages:
  - openssh-server
  - openssh-sftp-server
__bootstrap_sshd__config_mode: "0644"
__bootstrap_sshd__defaults:
  Port: 22
  Protocol: 2
  HostKey:
    - /etc/ssh/ssh_host_rsa_key
    - /etc/ssh/ssh_host_dsa_key
    - /etc/ssh/ssh_host_ecdsa_key
    - /etc/ssh/ssh_host_ed25519_key
  UsePrivilegeSeparation: true
  KeyRegenerationInterval: 3600
  ServerKeyBits: 1024
  SyslogFacility: AUTH
  LogLevel: INFO
  LoginGraceTime: 120
  PermitRootLogin: without-password
  StrictModes: true
  RSAAuthentication: true
  PubkeyAuthentication: true
  IgnoreRhosts: true
  RhostsRSAAuthentication: false
  HostbasedAuthentication: false
  PermitEmptyPasswords: false
  ChallengeResponseAuthentication: false
  X11Forwarding: true
  X11DisplayOffset: 10
  PrintMotd: false
  PrintLastLog: true
  TCPKeepAlive: true
  AcceptEnv: LANG LC_*
  Subsystem: sftp {{ __bootstrap_sshd__sftp_server }}
  UsePAM: true
__bootstrap_sshd__os_supported: true
__bootstrap_sshd__runtime_directory: sshd
