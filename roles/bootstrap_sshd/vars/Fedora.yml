---
__bootstrap_sshd__os_supported: true

__bootstrap_sshd__packages:
  - openssh
  - openssh-server
__bootstrap_sshd__sftp_server: /usr/libexec/openssh/sftp-server
# Fedora 32 ships with drop-in directory support so we touch
# just included file with highest priority by default
__bootstrap_sshd__config_file: "/etc/ssh/sshd_config.d/00-{{ role_name }}.conf"
# the defaults here represent the defaults shipped in the main sshd_config
__bootstrap_sshd__defaults:
  Include: /etc/ssh/sshd_config.d/*.conf
  AuthorizedKeysFile: .ssh/authorized_keys
  Subsystem: sftp /usr/libexec/sftp-server

__bootstrap_sshd__verify_hostkeys_default:
  - /etc/ssh/ssh_host_rsa_key
  - /etc/ssh/ssh_host_ecdsa_key
  - /etc/ssh/ssh_host_ed25519_key
__bootstrap_sshd__hostkeys_nofips:
  - /etc/ssh/ssh_host_ed25519_key

__bootstrap_sshd__drop_in_dir_mode: "0700"
__bootstrap_sshd__main_config_file: /etc/ssh/sshd_config

__bootstrap_sshd__environment_file: /etc/sysconfig/sshd
__bootstrap_sshd__environment_variable: $OPTIONS
__bootstrap_sshd__service_after: sshd-keygen.target
__bootstrap_sshd__service_wants:
  - sshd-keygen.target
  - ssh-host-keys-migration.service
__bootstrap_sshd__service_restart_timeout: 42s
