---
__bootstrap_sshd__os_supported: true

__bootstrap_sshd__service: ssh
__bootstrap_sshd__packages:
  - openssh-server
  - openssh-sftp-server
# Ubuntu 22.04 finally ships with drop-in directory support so we touch
# just included file with highest priority by default
__bootstrap_sshd__config_file: "/etc/ssh/sshd_config.d/00-{{ role_name }}.conf"
__bootstrap_sshd__config_mode: "0644"
# the defaults here represent the defaults shipped in the main sshd_config
__bootstrap_sshd__defaults:
  Include: /etc/ssh/sshd_config.d/*.conf
  KbdInteractiveAuthentication: false
  UsePAM: true
  PrintMotd: false
  AcceptEnv: LANG LC_*
  Subsystem: sftp  /usr/lib/openssh/sftp-server
  KexAlgorithms: curve25519-sha256@libssh.org,diffie-hellman-group-exchange-sha256

__bootstrap_sshd__runtime_directory: sshd

__bootstrap_sshd__drop_in_dir_mode: "0755"
__bootstrap_sshd__main_config_file: /etc/ssh/sshd_config

__bootstrap_sshd__environment_file: /etc/default/ssh
__bootstrap_sshd__environment_variable: $SSHD_OPTS
__bootstrap_sshd__service_after: auditd.service
__bootstrap_sshd__service_alias: sshd
