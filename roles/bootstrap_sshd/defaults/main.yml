---
### USER OPTIONS
# Set to false to disable this role completely
bootstrap_sshd__enable: true

# Don't apply OS defaults when set to true
bootstrap_sshd__skip_defaults: false

# If the below is false, don't manage the service or reload the SSH
# daemon at all
bootstrap_sshd__manage_service: true

# If the below is false, don't reload the ssh daemon on change
bootstrap_sshd__allow_reload: true

# If the below is true, also install service files from the templates pointed
# to by the `bootstrap_sshd__service_template_*` variables
bootstrap_sshd__install_service: false
bootstrap_sshd__service_template_service: sshd.service.j2
bootstrap_sshd__service_template_at_service: sshd@.service.j2
bootstrap_sshd__service_template_socket: sshd.socket.j2

# If the below is true, create a backup of the config file when the template is copied
bootstrap_sshd__backup: true

# If the below is true, also install the sysconfig file with the below options
# (useful only on Fedora and RHEL)
bootstrap_sshd__sysconfig: false

# If the below is true the role will override also crypto policy configuration
bootstrap_sshd__sysconfig_override_crypto_policy: false

# If the below is set to non-zero value, the OpenSSL random generator is
# reseeded with the given amount of random bytes (from getrandom(2)
# with GRND_RANDOM or /dev/random). Minimum is 14 bytes when enabled.
# This is not recommended to enable if you do not have hardware random number
# generator
bootstrap_sshd__sysconfig_use_strong_rng: 0

# Empty dicts to avoid errors
bootstrap_sshd__config: {}
# The path to bootstrap_sshd__config file. This is useful when creating an included
# configuration file snippet or configuring second sshd service
bootstrap_sshd__config_file: "{{ __bootstrap_sshd__config_file }}"

# If not empty, list of trusted CA keys
bootstrap_sshd__trusted_user_ca_keys_list: []
# If not empty, dict containing principals for users in the os
bootstrap_sshd__principals: {}
### VARS DEFAULTS
### The following are defaults for OS specific configuration in var files in
### this role. They should not be set directly by role users, unless they know
### what they are doing, e.g. installing extra packages or installing an
### alternative SystemD service file
bootstrap_sshd__packages: "{{ __bootstrap_sshd__packages }}"
bootstrap_sshd__config_owner: "{{ __bootstrap_sshd__config_owner }}"
bootstrap_sshd__config_group: "{{ __bootstrap_sshd__config_group }}"
bootstrap_sshd__config_mode: "{{ __bootstrap_sshd__config_mode | d('0644') }}"
bootstrap_sshd__binary: "{{ __bootstrap_sshd__binary }}"
bootstrap_sshd__service: "{{ __bootstrap_sshd__service }}"
bootstrap_sshd__sftp_server: "{{ __bootstrap_sshd__sftp_server }}"

bootstrap_sshd__drop_in_dir_mode: "{{ __bootstrap_sshd__drop_in_dir_mode }}"
bootstrap_sshd__main_config_file: "{{ __bootstrap_sshd__main_config_file }}"

bootstrap_sshd__trustedusercakeys_directory_owner: "{{ __bootstrap_sshd__trustedusercakeys_directory_owner }}"
bootstrap_sshd__trustedusercakeys_directory_group: "{{ __bootstrap_sshd__trustedusercakeys_directory_group }}"
bootstrap_sshd__trustedusercakeys_directory_mode: "{{ __bootstrap_sshd__trustedusercakeys_directory_mode }}"
bootstrap_sshd__trustedusercakeys_file_owner: "{{ __bootstrap_sshd__trustedusercakeys_file_owner }}"
bootstrap_sshd__trustedusercakeys_file_group: "{{ __bootstrap_sshd__trustedusercakeys_file_group }}"
bootstrap_sshd__trustedusercakeys_file_mode: "{{ __bootstrap_sshd__trustedusercakeys_file_mode }}"

bootstrap_sshd__authorizedprincipals_directory_owner: "{{ __bootstrap_sshd__authorizedprincipals_directory_owner }}"
bootstrap_sshd__authorizedprincipals_directory_group: "{{ __bootstrap_sshd__authorizedprincipals_directory_group }}"
bootstrap_sshd__authorizedprincipals_directory_mode: "{{ __bootstrap_sshd__authorizedprincipals_directory_mode }}"
bootstrap_sshd__authorizedprincipals_file_owner: "{{ __bootstrap_sshd__authorizedprincipals_file_owner }}"
bootstrap_sshd__authorizedprincipals_file_group: "{{ __bootstrap_sshd__authorizedprincipals_file_group }}"
bootstrap_sshd__authorizedprincipals_file_mode: "{{ __bootstrap_sshd__authorizedprincipals_file_mode }}"

# This lists by default all hostkeys as rendered in the generated configuration
# file ("auto"). Before attempting to run sshd (either for verification of
# configuration or restarting), we make sure the keys exist and have correct
# permissions. To disable this check, set bootstrap_sshd__verify_hostkeys to false
bootstrap_sshd__verify_hostkeys: auto

bootstrap_sshd__hostkey_owner: "{{ __bootstrap_sshd__hostkey_owner }}"
bootstrap_sshd__hostkey_group: "{{ __bootstrap_sshd__hostkey_group }}"
bootstrap_sshd__hostkey_mode: "{{ __bootstrap_sshd__hostkey_mode | d('0640') }}"

# instead of replacing the whole configuration file, just add a specified
# snippet
bootstrap_sshd__config_namespace:
# If this option is enabled, the role will configure firewall to open the ports
# defined in the configuration. This works only on Red Hat based systems.
bootstrap_sshd__manage_firewall: false

# If this option is enabled, the role will configure selinux to allow sshd to
# bind the ports defined in the configuration. This works only on Red Hat based systems.
bootstrap_sshd__manage_selinux: false
