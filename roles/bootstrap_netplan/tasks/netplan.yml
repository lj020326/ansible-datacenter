---

- name: "Install netplan packages"
  when:
    - bootstrap_netplan__check_install | bool
    - bootstrap_netplan__packages | d([], true) | length > 0
  ansible.builtin.package:
    name: "{{ bootstrap_netplan__packages }}"
    state: present
  become: true
  register: result
  until: result is successful

- name: "Ensure netplan directory exists"
  ansible.builtin.file:
    path: "{{ bootstrap_netplan__config_dir }}"
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: "Backup all existing netplan sources"
  when: bootstrap_netplan__remove_existing | bool
  block:
    - name: "Get current timestamp for backup"
      ansible.builtin.set_fact:
        __timestamp: "{{ ansible_facts['date_time']['iso8601_basic_short'] }}"
      run_once: true

    - name: "Backup all existing netplan sources into parent directory"
      community.general.archive:
        path: "{{ bootstrap_netplan__config_dir }}"
        dest: "{{ bootstrap_netplan__config_dir | dirname }}/netplan.backup_{{ __timestamp }}.tar.gz"
        format: gz
        remove: false
        mode: '0700'
        owner: root
        group: root

    - name: "Find all files in the netplan directory {{ bootstrap_netplan__config_dir }}"
      ansible.builtin.find:
        paths: "{{ bootstrap_netplan__config_dir }}"
        file_type: any
        recurse: false
      register: __found_files

    - name: "Remove the contents of {{ bootstrap_netplan__config_dir }}"
      when: __found_files.matched > 0
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ __found_files.files }}"

    - name: "Remove existing configurations"
      ansible.builtin.import_tasks: remove-existing.yml

- name: "Set default bootstrap_netplan__configuration from netplan template if none specified"
  when: bootstrap_netplan__configuration | length == 0
  ansible.builtin.set_fact:
    bootstrap_netplan__configuration: "{{ lookup('ansible.builtin.template', 'netplan.yml.j2') | from_yaml }}"

- name: "Display bootstrap_netplan__configuration"
  ansible.builtin.debug:
    var: bootstrap_netplan__configuration

- name: "Ensure custom netplan configuration"
  when: bootstrap_netplan__configuration | length > 0
  block:
    - name: "Ensure custom netplan configuration"
      ansible.builtin.template:
        src: config.yml.j2
        dest: "{{ bootstrap_netplan__config_file }}"
        mode: "0600"
      become: true
      notify: netplan generate config

    - name: "Slurp netplan configuration file"
      ansible.builtin.slurp:
        src: "{{ bootstrap_netplan__config_file }}"
      become: true
      register: netplan_slurp

    - name: "Display netplan configuration content for {{ bootstrap_netplan__config_file }}"
      ansible.builtin.debug:
        msg: "{{ (netplan_slurp['content'] | b64decode).splitlines() }}"

- name: "Ensure netplan configuration"
  when: bootstrap_netplan__configuration | length == 0
  block:
    - name: "Display __bootstrap_netplan__netplan_interfaces"
      ansible.builtin.debug:
        var: __bootstrap_netplan__netplan_interfaces

    - name: "Ensure netplan configuration"
      ansible.builtin.template:
        src: netplan.yml.j2
        dest: "{{ bootstrap_netplan__config_file }}"
        mode: "0600"
      become: true
      notify: netplan generate config
