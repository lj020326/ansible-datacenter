---

- name: "Install netplan packages"
  when:
    - bootstrap_netplan__check_install | bool
    - bootstrap_netplan__packages | d([], true) | length > 0
  ansible.builtin.package:
    name: "{{ bootstrap_netplan__packages }}"
    state: present
  become: true
  register: result
  until: result is successful

- name: "Remove existing configurations"
  when: bootstrap_netplan__remove_existing | bool
  ansible.builtin.import_tasks: remove-existing.yml

- name: "Set bootstrap_netplan__configuration fact from template"
  when: bootstrap_netplan__configuration | length == 0
  ansible.builtin.set_fact:
    bootstrap_netplan__configuration: "{{ lookup('ansible.builtin.template', 'netplan.yml.j2') | from_yaml }}"

- name: "Display bootstrap_netplan__configuration"
  ansible.builtin.debug:
    var: bootstrap_netplan__configuration

- name: "Ensure custom netplan configuration"
  when: bootstrap_netplan__configuration | length > 0
  block:
    - name: "Ensure custom netplan configuration"
      ansible.builtin.template:
        src: config.yml.j2
        dest: "{{ bootstrap_netplan__config_file }}"
        mode: "0600"
      become: true
      notify: netplan generate config

    - name: "Slurp netplan configuration file"
      ansible.builtin.slurp:
        src: "{{ bootstrap_netplan__config_file }}"
      become: true
      register: netplan_slurp

    - name: "Display netplan configuration content for {{ bootstrap_netplan__config_file }}"
      ansible.builtin.debug:
        msg: "{{ (netplan_slurp['content'] | b64decode).splitlines() }}"

- name: "Ensure netplan configuration"
  when: bootstrap_netplan__configuration | length == 0
  block:
    - name: "Display __bootstrap_netplan__netplan_interfaces"
      ansible.builtin.debug:
        var: __bootstrap_netplan__netplan_interfaces

    - name: "Ensure netplan configuration"
      ansible.builtin.template:
        src: netplan.yml.j2
        dest: "{{ bootstrap_netplan__config_file }}"
        mode: "0600"
      become: true
      notify: netplan generate config
