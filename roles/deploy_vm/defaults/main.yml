__deploy_vm__vmware_datacenter_default: dc-site-01
__deploy_vm__vmware_datacenter: "{{ deploy_vm__vmware_datacenter | d(__deploy_vm__vmware_datacenter_default) }}"
__deploy_vm__vmware_template_folder_default: "TemplateBuildAutomation/PROD"
__deploy_vm__vmware_template_folder: "{{ deploy_vm__vmware_template_folder
  | d(__deploy_vm__vmware_template_folder_default) }}"

##
## VM instance info
##
__deploy_vm__vmware_guest_domain_default: example.int
__deploy_vm__vmware_guest_domain: "{{ deploy_vm__vmware_guest_domain
  | d(__deploy_vm__vmware_guest_domain_default) }}"

__deploy_vm__vmware_host_default: esx01.{{ __deploy_vm__vmware_guest_domain }}
__deploy_vm__vmware_cluster_default: Management

__deploy_vm__vmware_gateway_ipv4_default: 192.168.0.1

__deploy_vm__vmware_vm_dns_nameservers_default:
  - 10.0.0.1

__deploy_vm__vmware_vm_dns_nameservers: "{{ deploy_vm__vmware_vm_dns_nameservers
  | d(__deploy_vm__vmware_vm_dns_nameservers_default) }}"

__deploy_vm__vmware_nameservers_default:
  addresses: "{{ __deploy_vm__vmware_vm_dns_nameservers }}"
  search:
    - "{{ __deploy_vm__vmware_guest_domain }}"

__deploy_vm__vmware_vm_folder_default: /{{ __deploy_vm__vmware_datacenter }}/vm/vm
__deploy_vm__vmware_vm_datastore_default: datastore1
__deploy_vm__vmware_vm_datastore_folder_default: vm

__deploy_vm__vmware_vm_template_id_default: centos8
__deploy_vm__vmware_vm_guest_id_default: centos64Guest
__deploy_vm__vmware_vm_os_flavor_default: linux

#__deploy_vm__vmware_vm_name_default: "{{ inventory_hostname_short }}"
__deploy_vm__vmware_vm_name_default: test-vm
__deploy_vm__vmware_vm_name: "{{ deploy_vm__vmware_vm_name | d(__deploy_vm__vmware_vm_name_default) }}"

##__deploy_vm__vmware_vm_mac_address_default: "11:01:aa:91:65:5b"
#__deploy_vm__vmware_vm_mac_address_default: "00:50:56:00:00:00"

#__deploy_vm__vmware_vm_controller_type_default: "lsilogic"
__deploy_vm__vmware_vm_controller_type_default: paravirtual

__deploy_vm__vmware_vm_network_name_default: VM Network
#__deploy_vm__vmware_vm_network_device_type_default: vmxnet3
#__deploy_vm__vmware_vm_network_device_type_default: e1000

__deploy_vm__vmware_vm_network_type_default: dhcp

__deploy_vm__vmware_node_services_default: []
__deploy_vm__vmware_new_vm_tags_default: []

__deploy_vm__vmware_vm_memory_mb_default: 1024
__deploy_vm__vmware_vm_num_cpus_default: 1
__deploy_vm__vmware_vm_disk_size_gb_default: 20
__deploy_vm__vmware_vm_disk_type_default: thin

deploy_vm__vmware_vm_hardware:
  memory_mb: "{{ deploy_vm__vmware_vm_memory_mb | d(__deploy_vm__vmware_vm_memory_mb_default) }}"
  num_cpus: "{{ deploy_vm__vmware_vm_num_cpus | d(__deploy_vm__vmware_vm_num_cpus_default) }}"
  scsi: "{{ deploy_vm__vmware_vm_controller_type | d(__deploy_vm__vmware_vm_controller_type_default) | d(omit) }}"

__deploy_vm__vmware_vm_disks_default:
  - size_gb: "{{ deploy_vm__vmware_vm_disk_size_gb | d(__deploy_vm__vmware_vm_disk_size_gb_default) }}"
    type: "{{ deploy_vm__vmware_vm_disk_type | d(__deploy_vm__vmware_vm_disk_type_default) }}"
    datastore: "{{ deploy_vm__vmware_vm_datastore | d(__deploy_vm__vmware_vm_datastore_default) }}"
    controller_type: "{{ deploy_vm__vmware_vm_controller_type | d(omit) }}"
    controller_number: "{{ deploy_vm__vmware_vm_controller_number | d(omit) }}"
    unit_number: "{{ deploy_vm__vmware_vm_unit_number | d(omit) }}"

__deploy_vm__vmware_new_vm_group_names_default: []
#__deploy_vm__vmware_vm_networks_default: []
#__deploy_vm__vmware_vm_networks_default:
#  - name: "{{ __deploy_vm__vmware_vm_network_name_default }}"
