deploy_vm__vm_os_template: gluster:vztmpl/centos-7-ssh-sudo_20180909.tar.gz
deploy_vm__vm_proxmox_node: gold
deploy_vm__vm_tftp_server: repo.example.int

__deploy_vm__vm_proxmox_defaults:
  balloon: "1024"
  cores: "1"
  cpus: "1"
  disk:
    ct: "2"
    vm: "10"
  format: qcow2
  memory:
    ct: "1024"
    vm: "2048"
  nameserver: 10.3.3.2
  net: '{"net0":"virtio,bridge=vmbr0"}'
  netif: '{"net0":"name=eth0,ip=dhcp,ip6=dhcp,bridge=vmbr0"}'
  node: gold
  onboot: true
  ostype: l26
  pubkey: ""
  scsihw: virtio-scsi-pci
  searchdomain: lan.example.int
  storage:
    gluster: gluster
    lvm: local-lvm
  swap:
    ct: "0"
    vm: "4"
  type: centos
  virtio: '{"virtio0":"gluster:10,cache=none,discard=on,format=qcow2"}'

__deploy_vm__vmware_appliance_name_default: vm-appliance-01
__deploy_vm__vmware_appliance_ova_default: /mnt/iso/VMware/vIDM/3.3/identity-manager-3.3.0.0-10084102_OVF10.ova
__deploy_vm__vmware_appliance_disk_provisioning_default: thin

__deploy_vm__vmware_appliance_networks_default:
  VM Network: Management

