#    connected: "{{ deploy_vm__vmware_vm_network_connected | d(true) }}"
#    mac: "{{ __deploy_vm__vmware_vm_mac_address_default | d(omit) }}"
#    device_type: "{{ __deploy_vm__vmware_vm_network_device_type_default | d(omit) }}"

__deploy_vm__vmware_vm_networks_default:
  - name: "{{ deploy_vm__vmware_vm_network_name | d(__deploy_vm__vmware_vm_network_name_default) }}"
    start_connected: "{{ deploy_vm__vmware_vm_network_start_connected | d(true) }}"
    connected: "{{ deploy_vm__vmware_vm_network_connected | d(true) }}"
    mac: "{{ deploy_vm__vmware_vm_mac_address | d(omit) }}"
    type: "{{ deploy_vm__vmware_vm_network_type | d(__deploy_vm__vmware_vm_network_type_default) }}"
    device_type: "{{ deploy_vm__vmware_vm_network_device_type | d(omit) }}"
    ip: "{{ deploy_vm__vmware_vm_network_ip | d(omit) }}"
    netmask: "{{ deploy_vm__vmware_vm_network_mask | d(omit) }}"
#  - name: "{{ workflow_stats[location][env].name }}"
#    ip: "{{ ip }}"
#    netmask: "{{ workflow_stats[location][env].netmask }}"
#    gateway: "{{ workflow_stats[location][env].gateway }}"
#    start_connected: True
#    type: static

__deploy_vm__vmware_vm_networks: "{{ deploy_vm__vmware_vm_networks | d(__deploy_vm__vmware_vm_networks_default) }}"

__deploy_vm__vmware_vm_boot_order_defaults:
  - floppy
  - cdrom
  - disk
  - ethernet

# === Add these for Copy/Paste support ===
__deploy_vm__vmware_vm_advanced_settings_defaults:
  - key: "isolation.tools.copy.disable"
    value: "FALSE"
  - key: "isolation.tools.paste.disable"
    value: "FALSE"
  - key: "isolation.tools.setGUIOptions.enable"
    value: "TRUE"


__deploy_vm__vmware_vm_defaults:
  name: "{{ __deploy_vm__vmware_vm_name }}"
  hostname: "{{ __deploy_vm__vmware_vm_name }}.{{ deploy_vm__vmware_guest_domain }}"
  template_id: "{{ deploy_vm__vmware_vm_template_id | d(__deploy_vm__vmware_vm_template_id_default) }}"
  os_flavor: "{{ deploy_vm__vmware_vm_os_flavor | d(__deploy_vm__vmware_vm_os_flavor_default) }}"
  guest_id: "{{ deploy_vm__vmware_vm_guest_id | d(__deploy_vm__vmware_vm_guest_id_default) }}"
  guest_domain: "{{ deploy_vm__vmware_guest_domain }}"
  cluster: "{{ deploy_vm__vmware_vm_cluster | d(__deploy_vm__vmware_cluster_default) }}"
  host: "{{ deploy_vm__vmware_vm_host | d(__deploy_vm__vmware_host_default) }}"
  folder: "{{ deploy_vm__vmware_vm_folder | d(__deploy_vm__vmware_vm_folder_default) }}"
  gateway_ipv4: "{{ deploy_vm__vmware_vm_gateway_ipv4 | d(__deploy_vm__vmware_gateway_ipv4_default) }}"
  nameservers: "{{ deploy_vm__vm_nameservers | d(__deploy_vm__vmware_nameservers_default) }}"
  datastore: "{{ deploy_vm__vmware_vm_datastore | d(__deploy_vm__vmware_vm_datastore_default) }}"
  datastore_folder: "{{ deploy_vm__vmware_vm_datastore_folder | d(__deploy_vm__vmware_vm_datastore_folder_default) }}"
  controller_type: "{{ deploy_vm__vmware_vm_controller_type | d(__deploy_vm__vmware_vm_controller_type_default) }}"
  hardware: "{{ deploy_vm__vmware_vm_hardware }}"
  network_type: "{{ deploy_vm__vmware_vm_network_type | d(__deploy_vm__vmware_vm_network_type_default) }}"
  networks: "{{ __deploy_vm__vmware_vm_networks | d(__deploy_vm__vmware_vm_networks_default) }}"
  disks: "{{ deploy_vm__vmware_vm_disks | d(__deploy_vm__vmware_vm_disks_default) }}"
  services: "{{ deploy_vm__vmware_vm_node_services | d(__deploy_vm__vmware_vm_node_services_default) }}"
  deploy_groups: "{{ deploy_vm__vmware_node_services | d(__deploy_vm__vmware_node_services_default) + deploy_vm__vmware_new_vm_group_names | d(__deploy_vm__vmware_new_vm_group_names_default)
    | flatten }}"
  vm_tags: "{{ deploy_vm__vmware_new_vm_tags | d(__deploy_vm__vmware_new_vm_tags_default) }}"
  boot_order: "{{ deploy_vm__vmware_vm_boot_order | d(__deploy_vm__vmware_vm_boot_order_defaults) }}"
  advanced_settings: "{{ deploy_vm__vmware_vm_advanced_settings | d(__deploy_vm__vmware_vm_advanced_settings_defaults) }}"

deploy_vm__containers: []
deploy_vm__workdir: /tmp/deploy_vm__workdir

