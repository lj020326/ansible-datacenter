__deploy_vm__vmware_appliance_defaults:
  name: "{{ deploy_vm__vmware_appliance_name | d(__deploy_vm__vmware_appliance_name_default) }}"
  cluster: "{{ deploy_vm__vmware_vm_cluster | d(__deploy_vm__vmware_cluster_default) }}"
  host: "{{ deploy_vm__vmware_vm_host | d(__deploy_vm__vmware_host_default) }}"
  datastore: "{{ deploy_vm__vmware_appliance_datastore | d(__deploy_vm__vmware_vm_datastore_default) }}"
  folder: "{{ deploy_vm__vmware_appliance_datastore_folder | d(__deploy_vm__vmware_vm_datastore_folder_default) }}"
  disk_provisioning: "{{ deploy_vm__vmware_appliance_disk_provisioning | d(__deploy_vm__vmware_appliance_disk_provisioning_default) }}"
  networks: "{{ deploy_vm__vmware_appliance_networks | d(__deploy_vm__vmware_appliance_networks_default) }}"
  ova: "{{ deploy_vm__vmware_appliance_ova | d(__deploy_vm__vmware_appliance_ova_default) }}"
  allow_duplicates: false
  power_on: true
  fail_on_spec_warnings: true
  wait: true
  wait_for_ip_address: true
  inject_ovf_env: true
  properties: "{{ deploy_vm__vmware_appliance_properties | d(omit) }}"
