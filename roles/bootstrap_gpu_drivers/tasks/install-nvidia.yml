---

- name: Unload nouveau # noqa: ignore-errors
  community.general.modprobe:
    name: nouveau
    state: absent
  ignore_errors: true

- name: Ubuntu install tasks (canonical repos)
  when:
    - ansible_facts['distribution'] == 'Ubuntu'
    - not bootstrap_gpu_drivers__nvidia_ubuntu_install_from_cuda_repo
  ansible.builtin.include_tasks: nvidia/install-ubuntu.yml

- name: Ubuntu install tasks (CUDA repo)
  when:
    - ansible_facts['distribution'] == 'Ubuntu'
    - bootstrap_gpu_drivers__nvidia_ubuntu_install_from_cuda_repo
  ansible.builtin.include_tasks: nvidia/install-ubuntu-cuda-repo.yml

- name: Redhat family install tasks
  when: ansible_facts['os_family'] == 'RedHat'
  ansible.builtin.include_tasks: nvidia/install-redhat.yml

- name: Create persistenced override dir
  ansible.builtin.file:
    path: /etc/systemd/system/nvidia-persistenced.service.d/
    state: directory
    recurse: true

- name: Configure persistenced service to turn on persistence mode
  when: bootstrap_gpu_drivers__persistence_mode_on
  ansible.builtin.copy:
    src: nvidia-persistenced-override.conf
    dest: /etc/systemd/system/nvidia-persistenced.service.d/override.conf
    mode: "0644"

- name: Remove persistenced service override
  when: not bootstrap_gpu_drivers__persistence_mode_on
  ansible.builtin.file:
    path: /etc/systemd/system/nvidia-persistenced.service.d/override.conf
    state: absent

- name: Enable persistenced
  when: bootstrap_gpu_drivers__package_state != 'absent'
  ansible.builtin.systemd:
    name: nvidia-persistenced
    enabled: true

- name: Set module parameters
  when: bootstrap_gpu_drivers__nvidia_module_params | d('') | length > 0
  ansible.builtin.template:
    src: nvidia.conf.j2
    dest: "{{ bootstrap_gpu_drivers__nvidia_module_file }}"
    mode: "0644"

- name: Reboot after driver install
  when:
    - __install_driver.changed
    - not bootstrap_gpu_drivers__skip_reboot
  ansible.builtin.reboot:
