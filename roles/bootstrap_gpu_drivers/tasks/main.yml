---
- name: Ensure basic tools
  ansible.builtin.package:
    name:
      - pciutils
      - "{{ 'mesa-utils' if ansible_facts.os_family == 'Debian' else 'mesa-demos' | default(omit) }}"
      - "{{ 'dkms' if ansible_facts.os_family == 'RedHat' else omit }}"
    state: present
    update_cache: "{{ ansible_facts.os_family == 'Debian' }}"

- name: Detect GPUs via lspci
  ansible.builtin.command: lspci -nn
  register: __lspci_output
  changed_when: false

- name: Display __lspci_output
  ansible.builtin.debug:
    var: __lspci_output

- name: Auto-detect GPU vendors
  ansible.builtin.set_fact:
    __detected_nvidia: "{{ '10de:' in __lspci_output.stdout }}"
    __detected_amd: "{{ '1002:' in __lspci_output.stdout }}"
    __detected_intel: "{{ '8086:' in __lspci_output.stdout }}"

- name: Merge detection with overrides
  ansible.builtin.set_fact:
    __bootstrap_gpu_drivers__enable_nvidia: "{{ bootstrap_gpu_drivers__enable_nvidia | default(__detected_nvidia) }}"
    __bootstrap_gpu_drivers__enable_amd: "{{ bootstrap_gpu_drivers__enable_amd | default(__detected_amd) }}"
    __bootstrap_gpu_drivers__enable_intel: "{{ bootstrap_gpu_drivers__enable_intel | default(__detected_intel) }}"

- name: Show detected GPUs
  ansible.builtin.debug:
    msg: |
      GPU Detection:
      • NVIDIA: {{ __bootstrap_gpu_drivers__enable_nvidia }}
      • AMD:    {{ __bootstrap_gpu_drivers__enable_amd }}
      • Intel:  {{ __bootstrap_gpu_drivers__enable_intel }}

- name: Fail if no GPUs detected and no manual enable
  ansible.builtin.assert:
    that: (__bootstrap_gpu_drivers__enable_nvidia or __bootstrap_gpu_drivers__enable_amd or __bootstrap_gpu_drivers__enable_intel)
    fail_msg: "No supported GPUs detected and none were manually enabled."

# === Install per vendor ===
- name: Install NVIDIA drivers
  when: __bootstrap_gpu_drivers__enable_nvidia | bool
  block:
    - name: "GPU Drivers | NVIDIA | Skip driver install on DGX OS (pre-installed)"
      when:
        - __bootstrap_gpu_drivers__is_dgx | bool
        - bootstrap_gpu_drivers__skip_driver_install_on_dgx | bool
      ansible.builtin.debug:
        msg: "🚀 DGX OS detected with GB10 - skipping NVIDIA driver installation (already provided by DGX)"

    - name: "GPU Drivers | NVIDIA | Install drivers (standard x86 Ubuntu)"
      when:
        - not (__bootstrap_gpu_drivers__is_dgx | bool)
        - not (bootstrap_gpu_drivers__skip_driver_install_on_dgx | bool)
      ansible.builtin.include_tasks: install-nvidia.yml

- name: Install AMD drivers
  when: __bootstrap_gpu_drivers__enable_amd | bool
  ansible.builtin.include_tasks: install-amd.yml

- name: Install Intel drivers
  when: __bootstrap_gpu_drivers__enable_intel | bool
  ansible.builtin.include_tasks: install-intel.yml

# === Post-install verification ===
- name: Verify NVIDIA
  when: __bootstrap_gpu_drivers__enable_nvidia | bool
  ansible.builtin.command: nvidia-smi
  changed_when: false

- name: Verify AMD
  when: __bootstrap_gpu_drivers__enable_amd | bool
  ansible.builtin.command: rocminfo || echo "AMD driver loaded (amdgpu)"
  changed_when: false

- name: Reboot if needed
  when:
    - not bootstrap_gpu_drivers__skip_reboot
    - (nvidia_verify.changed | default(false)) or ansible_facts['changed'] | default(false)
  ansible.builtin.reboot:
    reboot_timeout: 600
