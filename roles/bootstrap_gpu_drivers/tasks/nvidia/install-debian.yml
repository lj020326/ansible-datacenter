---
- name: Enable contrib + non-free repositories (Debian)
  ansible.builtin.apt_repository:
    repo: "deb http://deb.debian.org/debian {{ _debian_codename }} main contrib non-free non-free-firmware"
    state: present
    filename: debian-nonfree
  when: bootstrap_gpu_drivers__nvidia_debian_use_nonfree

- name: Install NVIDIA drivers (Debian way)
  ansible.builtin.apt:
    name:
      - nvidia-driver
      - firmware-misc-nonfree
    state: "{{ bootstrap_gpu_drivers__package_state }}"
    update_cache: true
  register: __install_driver
