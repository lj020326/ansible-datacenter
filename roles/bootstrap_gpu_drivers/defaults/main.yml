---

bootstrap_gpu_drivers__package_state: present
#bootstrap_gpu_drivers__package_version: 570
bootstrap_gpu_drivers__package_version: ""
bootstrap_gpu_drivers__persistence_mode_on: true
bootstrap_gpu_drivers__skip_reboot: true

bootstrap_gpu_drivers__nvidia_module_file: /etc/modprobe.d/nvidia.conf
bootstrap_gpu_drivers__nvidia_module_params: ""
bootstrap_gpu_drivers__nvidia_add_repos: true

bootstrap_gpu_drivers__nvidia_package_branch_default: "550"
# Only set these if you want to FORCE a specific version globally
# bootstrap_gpu_drivers__nvidia_package_branch: "570"
# bootstrap_gpu_drivers__nvidia_ubuntu_packages_suffix: "-server"

##############################################################################
# RedHat family                                                              #
##############################################################################
bootstrap_gpu_drivers__epel_package: https://dl.fedoraproject.org/pub/epel/epel-release-latest-{{ ansible_facts['distribution_major_version'] }}.noarch.rpm
bootstrap_gpu_drivers__epel_repo_key: https://dl.fedoraproject.org/pub/epel/RPM-GPG-KEY-EPEL-{{ ansible_facts['distribution_major_version'] }}
bootstrap_gpu_drivers__nvidia_rhel_cuda_repo_baseurl: https://developer.download.nvidia.com/compute/cuda/repos/{{ _rhel_repo_dir }}/
bootstrap_gpu_drivers__nvidia_rhel_cuda_repo_gpgkey: https://developer.download.nvidia.com/compute/cuda/repos/{{ _rhel_repo_dir }}/D42D0685.pub

bootstrap_gpu_drivers__nvidia_rhel_branch: "{{ bootstrap_gpu_drivers__nvidia_package_branch
  | d(bootstrap_gpu_drivers__nvidia_package_branch_default) }}"

##############################################################################
# Ubuntu                                                                     #
##############################################################################

# Driver branch to install with Ubuntu
# Only set these if you want to FORCE a specific version globally
# bootstrap_gpu_drivers__nvidia_ubuntu_branch: "{{ __bootstrap_gpu_drivers__nvidia_package_branch }}"

# Determine if we should install from CUDA repo instead of Canonical repos
bootstrap_gpu_drivers__nvidia_ubuntu_install_from_cuda_repo: false

#bootstrap_gpu_drivers__nvidia_ubuntu_packages_suffix: "-server"
bootstrap_gpu_drivers__nvidia_ubuntu_packages_suffix: -open

# Installing with Canonical repositories
#bootstrap_gpu_drivers__nvidia_ubuntu_packages:
#  - "nvidia-headless-{{ bootstrap_gpu_drivers__nvidia_ubuntu_branch }}{{ bootstrap_gpu_drivers__nvidia_ubuntu_packages_suffix }}"
#  - "nvidia-utils-{{ bootstrap_gpu_drivers__nvidia_ubuntu_branch }}{{ bootstrap_gpu_drivers__nvidia_ubuntu_packages_suffix }}"
#  - "nvidia-headless-no-dkms-{{ bootstrap_gpu_drivers__nvidia_ubuntu_branch }}{{ bootstrap_gpu_drivers__nvidia_ubuntu_packages_suffix }}"
#  - "nvidia-kernel-source-{{ bootstrap_gpu_drivers__nvidia_ubuntu_branch }}{{ bootstrap_gpu_drivers__nvidia_ubuntu_packages_suffix }}"

#bootstrap_gpu_drivers__nvidia_ubuntu_packages:
#  - nvidia-driver-{{ bootstrap_gpu_drivers__nvidia_ubuntu_branch }}{{ bootstrap_gpu_drivers__nvidia_ubuntu_packages_suffix }}
#  #  - "nvidia-firmware-{{ bootstrap_gpu_drivers__nvidia_ubuntu_branch }}"
#  - nvidia-kernel-common-{{ bootstrap_gpu_drivers__nvidia_ubuntu_branch }}
#  - nvidia-kernel-source-{{ bootstrap_gpu_drivers__nvidia_ubuntu_branch }}{{ bootstrap_gpu_drivers__nvidia_ubuntu_packages_suffix }}
#  - nvidia-compute-utils-{{ bootstrap_gpu_drivers__nvidia_ubuntu_branch }}
#  - nvidia-utils-{{ bootstrap_gpu_drivers__nvidia_ubuntu_branch }}
#  - nvidia-prime
#  - nvidia-settings

#dpkg -l nvidia-*
#||/ Name                                  Version                     Architecture Description
#+++-=====================================-===========================-============-===============================================
#  ii  nvidia-compute-utils-570                         570.133.07-0ubuntu0.24.04.1               amd64        NVIDIA compute utilities
#  ii  nvidia-driver-570-open                           570.133.07-0ubuntu0.24.04.1               amd64        NVIDIA driver (open kernel) metapackage
#  ii  nvidia-firmware-570-570.133.07                   570.133.07-0ubuntu0.24.04.1               amd64        Firmware files used by the kernel module
#  ii  nvidia-kernel-common-570                         570.133.07-0ubuntu0.24.04.1               amd64        Shared files used with the kernel module
#  ii  nvidia-kernel-source-570-open                    570.133.07-0ubuntu0.24.04.1               amd64        NVIDIA kernel source package
#  ii  nvidia-prime                                     0.8.17.2                                  all          Tools to enable NVIDIA's Prime
#  ii  nvidia-settings                                  510.47.03-0ubuntu4                        amd64        Tool for configuring the NVIDIA graphics driver
#  ii  nvidia-utils-570

# Installing with CUDA repositories
bootstrap_gpu_drivers__nvidia_ubuntu_cuda_repo_gpgkey_id_old: 7fa2af80
bootstrap_gpu_drivers__nvidia_ubuntu_cuda_repo_baseurl: https://developer.download.nvidia.com/compute/cuda/repos/{{ _ubuntu_repo_dir }}
bootstrap_gpu_drivers__nvidia_ubuntu_cuda_keyring_package: cuda-keyring_1.0-1_all.deb
bootstrap_gpu_drivers__nvidia_ubuntu_cuda_keyring_url: "{{ bootstrap_gpu_drivers__nvidia_ubuntu_cuda_repo_baseurl }}/{{
  bootstrap_gpu_drivers__nvidia_ubuntu_cuda_keyring_package }}"
bootstrap_gpu_drivers__nvidia_ubuntu_cuda_package: cuda-drivers-{{ bootstrap_gpu_drivers__nvidia_ubuntu_branch }}

_ubuntu_repo_dir: "{{ ansible_facts['distribution'] | lower }}{{ ansible_facts['distribution_version']
  | replace('.', '') }}/{{ ansible_facts['architecture'] }}"
_rhel_repo_dir: "rhel{{ ansible_facts['distribution_major_version'] }}/{{ ansible_facts['architecture'] }}"

## AMD
bootstrap_gpu_drivers__amd_deb_package_base_url: "https://repo.radeon.com/amdgpu-install/latest/ubuntu/{{ ansible_facts['distribution_release'] | lower }}"

##############################################################################
# NVIDIA Container Toolkit (CDI + Docker runtime)
##############################################################################
bootstrap_gpu_drivers__nvidia_install_container_toolkit: false
# Optional: pin a specific version (e.g. "1.19.0-1")
bootstrap_gpu_drivers__nvidia_container_toolkit_version: ""
