---

bootstrap_awx_config__force_update: false

# Organisation Settings
bootstrap_awx_config__org_name: ExampleOrg

# URL Settings
bootstrap_awx_config__awx_url: panel.example.org

# AWX/Automation Controller Settings
bootstrap_awx_config__admin_username: admin
bootstrap_awx_config__admin_password: << strong-password >>
bootstrap_awx_config__secret_key: << strong-password >>
bootstrap_awx_config__pg_password: << strong-password >>

# Deploy All Settings
bootstrap_awx_config__update_schedule_start: '20210101T000000'
bootstrap_awx_config__update_schedule_frequency: 'HOURLY'
bootstrap_awx_config__update_schedule_interval: 1

# Repository Settings
bootstrap_awx_config__deploy_source: https://github.com/spantaleev/matrix-docker-ansible-deploy.git
bootstrap_awx_config__deploy_branch: master
