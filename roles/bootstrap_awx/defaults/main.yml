---

# URL Settings
bootstrap_awx__awx_url: panel.example.org
bootstrap_awx__rancher_url: rancher.example.org
bootstrap_awx__certbot_email: ljohnson@dettonville.com

# Cloudflare
bootstrap_awx__cloudflare_api_key: << cloudflare API key >>
bootstrap_awx__cloudflare_email: cloudflareaccount@protonmail.com

# Rancher settings
bootstrap_awx__rancher_password: << strong-password >>

# AWX/Automation Controller Settings
bootstrap_awx__admin_username: admin
bootstrap_awx__admin_password: << strong-password >>
bootstrap_awx__secret_key: << strong-password >>
bootstrap_awx__pg_password: << strong-password >>

# AWX Firewalld configs
bootstrap_awx__firewalld_services:
  - name: ssh
  - name: http
  - name: https

#bootstrap_awx__firewalld_ports:
#  - 22/tcp
#  - 80/tcp
#  - 443/tcp

bootstrap_awx__arch: "{{ 'arm64' if ansible_facts.machine == 'aarch64' else 'amd64' }}"
bootstrap_awx__cmtl_version: "1.10.1"
bootstrap_awx__cmtl_archive: "cmctl-linux-{{ bootstrap_awx__arch }}.tar.gz"
bootstrap_awx__cmtl_url: "https://github.com/cert-manager/cert-manager/releases/download/v{{
  bootstrap_awx__cmtl_version }}/{{ bootstrap_awx__cmtl_archive }}"
bootstrap_awx__cmtl_checksum: sha256:c0996ec98b87c8ee2854162da25238c4e74092c3ab156710619423f794eb1aa6
