---

# System packages required
bootstrap_llm_host__system_packages:
  - curl
  - wget
  - git
  - python3
  - python3-pip
  - python3-venv
  - nodejs
  - npm
  - ufw
  - htop
  - nvtop
  - build-essential

__bootstrap_llm_host__nginx_conf_path: "/etc/nginx/sites-available"
__bootstrap_llm_host__nginx_enabled_path: "/etc/nginx/sites-enabled"
