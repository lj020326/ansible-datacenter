---
# NemoClaw Deployment Configuration
bootstrap_llm_host__install_nemoclaw: true
bootstrap_llm_host__nemoclaw_version: "latest"
bootstrap_llm_host__nemoclaw_user: "nemoclaw"
bootstrap_llm_host__nemoclaw_home_dir: "/home/{{ bootstrap_llm_host__nemoclaw_user }}"
bootstrap_llm_host__nemoclaw_port: "9000"

# OpenShell Workspace & Sandboxing Paths
bootstrap_llm_host__nemoclaw_workspace_dir: "{{ bootstrap_llm_host__nemoclaw_home_dir }}/workspace"
bootstrap_llm_host__nemoclaw_sandbox_root: "/var/lib/nemoclaw/sandboxes"

# Target Orchestration / Router Core Model Configuration
bootstrap_llm_host__nemoclaw_orchestration_model: "deepseek-r1:14b" # Optimized for tool execution loops

__bootstrap_llm_host__nemoclaw_models:
  - type: pull
    name: "qwen3.5:27b"
  - type: pull
    # Explicit addition for NemoClaw framework tool execution logic
    name: "deepseek-r1:14b"
