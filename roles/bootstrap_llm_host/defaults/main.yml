# System packages required
bootstrap_llm_host__system_packages:
  - curl
  - wget
  - git
  - python3
  - python3-pip
  - python3-venv
  - nodejs
  - npm
  - nginx

# NVIDIA packages
#bootstrap_llm_host__nvidia_packages:
#  - nvidia-driver-535
#  - cuda-toolkit-12-2
#
#bootstrap_llm_host__nvidia_packages:
#  - nvidia-driver-570-open
#  - cuda-toolkit-12-12

bootstrap_llm_host__nvidia_package_dist: "{{ ansible_facts['distribution'] | lower }}{{
  ansible_facts['distribution_version'] | replace('.', '') }}"

#bootstrap_llm_host__nvidia_package_version: "1.0-1"
bootstrap_llm_host__nvidia_package_version: 1.1-1

bootstrap_llm_host__nvidia_package: cuda-keyring_{{ bootstrap_llm_host__nvidia_package_version }}_all.deb

bootstrap_llm_host__nvidia_package_url: "https://developer.download.nvidia.com/compute/cuda/repos/{{
    bootstrap_llm_host__nvidia_package_dist }}/x86_64/{{ bootstrap_llm_host__nvidia_package }}"
