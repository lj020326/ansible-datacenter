---

# Feature Flags
bootstrap_llm_host__install_gpu_drivers: true
bootstrap_llm_host__install_ollama: true
bootstrap_llm_host__install_ollama_webui: false
bootstrap_llm_host__install_open_webui: true
bootstrap_llm_host__configure_firewall: true
bootstrap_llm_host__download_models: true
bootstrap_llm_host__configure_proxy: true

# Ollama runtime mode: "native", "docker", or "swarm"
#   "native" (default, systemd), "docker" (container), or "swarm" (docker swarm service)
bootstrap_llm_host__ollama_runtime: "native"

# Docker-specific
# When using docker runtime
bootstrap_llm_host__ollama_container_name: "ollama"
bootstrap_llm_host__ollama_host_volume_path: "/home/docker/ollama/data"
# from docker-compose ps output, the prefix
bootstrap_llm_host__docker_compose_project_name: "docker"

# Swarm (stack service)
# usually the service name in the stack
bootstrap_llm_host__ollama_service_name: "ollama"
# prefix from your compose/stack
bootstrap_llm_host__docker_stack_name: "docker_stack"

# Proxy Configuration
bootstrap_llm_host__proxy_port: "80"
bootstrap_llm_host__proxy_type: traefik
#bootstrap_llm_host__server_name: localhost
bootstrap_llm_host__server_name: "{{ ansible_facts['fqdn'] | d(ansible_facts['hostname']) | d(ansible_host) }}"

# Traefik specific (defaults)
bootstrap_llm_host__traefik_entrypoint: web
bootstrap_llm_host__traefik_config_path: "/etc/traefik/conf.d"
#bootstrap_llm_host__traefik_archive_url: "https://github.com/traefik/traefik/releases/download/v3.3.4/traefik_v3.3.4_linux_amd64.tar.gz"
bootstrap_llm_host__traefik_archive_url: "https://github.com/traefik/traefik/releases/download/v3.3.4/traefik_v3.3.4_linux_{{
  'amd64' if ansible_facts['architecture'] == 'x86_64' else 'arm64' }}.tar.gz"

# Nginx specific
__bootstrap_llm_host__nginx_conf_path: "/etc/nginx/sites-available"
__bootstrap_llm_host__nginx_enabled_path: "/etc/nginx/sites-enabled"

# User Configuration
bootstrap_llm_host__ollama_user: ollama
bootstrap_llm_host__webui_user: webui

# Paths - defaults assume native case
bootstrap_llm_host__ollama_home_dir: "/home/{{ bootstrap_llm_host__ollama_user }}"
bootstrap_llm_host__webui_home_dir: "/home/{{ bootstrap_llm_host__webui_user }}"

# Service Configuration
bootstrap_llm_host__ollama_port: "11434"
bootstrap_llm_host__webui_port: "8080"

# only used for native case
bootstrap_llm_host__model_storage_dir: "{{ bootstrap_llm_host__ollama_home_dir }}/.ollama/models"
#bootstrap_llm_host__model_storage_dir: "/data/ollama/models"

#bootstrap_llm_host__webui_venv_dir: "/opt/open-webui-venv"
bootstrap_llm_host__webui_venv_dir: "/home/{{ bootstrap_llm_host__webui_user }}/open-webui-venv"
bootstrap_llm_host__webui_tmpdir: "/home/{{ bootstrap_llm_host__webui_user }}/tmp"

bootstrap_llm_host__webui_secret_key: "{{ lookup('community.general.random_string', length=32) }}"

# Timeout Configuration
bootstrap_llm_host__model_download_timeout: 3600
bootstrap_llm_host__service_timeout: 300

# Model Configurations
bootstrap_llm_host__models: []

# Example usage in vars (override in playbook/inventory):
#bootstrap_llm_host__models:
#  - name: deepseek-coder:6.7b
#    type: pull
#  - name: deepseek-coder:1.3b
#    type: pull
#  - name: deepseek-llm:7b
#    type: pull
#  # ~17 GB VRAM at Q4_K_M, excellent coding/reasoning
#  - name: qwen3.5:27b
#    type: pull
#  # optional lighter variant
#  - name: qwen3.5:14b
#    type: pull
#  # For pure coding focus (if available): qwen3-coder:32b or similar
#  - name: qwen3-coder:32b
#  - name: qwen3.5-custom
#    type: custom
#    gguf_url: https://huggingface.co/unsloth/Qwen3.5-27B-GGUF/resolve/main/Qwen3.5-27B-Q4_K_M.gguf
#    num_ctx: 65536  # 64K context (great for codebases)
#    temperature: 0.6
#    environment: {}
#  - name: "deepseek-coder:6.7b"
#  - name: "deepseek-coder:1.3b"

# System packages required
bootstrap_llm_host__system_packages:
  - curl
  - wget
  - git
  - python3
  - python3-pip
  - python3-venv
  - nodejs
  - npm
  - nginx

# NVIDIA packages
#bootstrap_llm_host__nvidia_packages:
#  - nvidia-driver-535
#  - cuda-toolkit-12-2
#
#bootstrap_llm_host__nvidia_packages:
#  - nvidia-driver-570-open
#  - cuda-toolkit-12-12

bootstrap_llm_host__nvidia_package_dist: "{{ ansible_facts['distribution'] | lower }}{{
  ansible_facts['distribution_version'] | replace('.', '') }}"

#bootstrap_llm_host__nvidia_package_version: "1.0-1"
bootstrap_llm_host__nvidia_package_version: 1.1-1

bootstrap_llm_host__nvidia_package: cuda-keyring_{{ bootstrap_llm_host__nvidia_package_version }}_all.deb

bootstrap_llm_host__nvidia_package_url: "https://developer.download.nvidia.com/compute/cuda/repos/{{
    bootstrap_llm_host__nvidia_package_dist }}/x86_64/{{ bootstrap_llm_host__nvidia_package }}"

# =============================================================================
# llama.cpp Server (speculative decoding + OpenAI /v1 endpoint for Continue.dev)
# =============================================================================
bootstrap_llm_host__install_llama_cpp: false

# Runtime (same options as Ollama)
bootstrap_llm_host__llama_cpp_runtime: "{{ bootstrap_llm_host__ollama_runtime }}"   # defaults to same as Ollama

# Container / Service names
bootstrap_llm_host__llama_cpp_container_name: "llama-cpp"
bootstrap_llm_host__llama_cpp_service_name: "llama-cpp"
bootstrap_llm_host__llama_cpp_host_volume_path: "/home/container-user/docker/llama-cpp/models"

# Port on host
bootstrap_llm_host__llama_cpp_port: "8081"

# GGUF models to download automatically (add/remove as needed)
bootstrap_llm_host__llama_cpp_models:
  - repo: unsloth/gemma-4-31B-it-GGUF
    filename: gemma-4-31B-it-Q5_K_M.gguf
  # or Q4_K_M if you want lighter
  - repo: unsloth/gemma-4-E2B-it-GGUF
    filename: gemma-4-E2B-it-Q5_K_M.gguf

# Runtime parameters passed to llama-server
bootstrap_llm_host__llama_cpp_ctx_size: 32768
bootstrap_llm_host__llama_cpp_n_gpu_layers: 99
bootstrap_llm_host__llama_cpp_temp: 0.7
bootstrap_llm_host__llama_cpp_flash_attn: 1
