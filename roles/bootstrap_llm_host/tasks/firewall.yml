---
- name: Configure firewall ports
  ansible.builtin.include_role:
    name: bootstrap_linux_firewalld
  vars:
    firewalld_action: configure
    firewalld_ports:
      - "{{ bootstrap_llm_host__proxy_port }}/tcp"
      - "{{ bootstrap_llm_host__webui_port }}/tcp"
      - "{{ bootstrap_llm_host__ollama_port }}/tcp"
      # Open access for incoming tool-use pipelines
      - "{{ bootstrap_llm_host__nemoclaw_port }}/tcp"
