---

- name: Include OS-specific variables
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - "{{ ansible_facts['distribution'] | lower() }}-{{ ansible_facts['distribution_major_version'] | lower() }}.yml"
    - "{{ ansible_facts['distribution'] | lower() }}.yml"
    - "{{ ansible_facts['os_family'] | lower() }}.yml"

- name: Include dependency installation tasks
  ansible.builtin.include_tasks: dependencies.yml

- name: Include Ollama installation tasks
  when:
    - bootstrap_llm_host__install_ollama
    - bootstrap_llm_host__ollama_runtime == 'native'
  ansible.builtin.include_tasks: ollama.yml

- name: Include llama.cpp server tasks
  when: bootstrap_llm_host__install_llama_cpp
  ansible.builtin.include_tasks: llama_cpp.yml

- name: Include model download tasks
  when: bootstrap_llm_host__download_models
  ansible.builtin.include_tasks: models.yml

- name: Include WebUI installation tasks
  when: bootstrap_llm_host__install_open_webui or bootstrap_llm_host__install_ollama_webui
  ansible.builtin.include_tasks: webui.yml

- name: Include reverse proxy configuration tasks
  when: bootstrap_llm_host__configure_proxy
  ansible.builtin.include_tasks: proxy.yml

- name: Include firewall configuration tasks
  when: bootstrap_llm_host__configure_firewall
  ansible.builtin.include_tasks: firewall.yml

- name: Display server information
  ansible.builtin.debug:
    msg: |
      ===============================================
      LLM Server Setup Complete!
      ===============================================

      Services:
      - Ollama API: http://{{ bootstrap_llm_host__server_name }}:{{ bootstrap_llm_host__ollama_port }}
      - Web UI: http://{{ bootstrap_llm_host__server_name }}:{{ bootstrap_llm_host__webui_port }}
      - Nginx Proxy: http://{{ bootstrap_llm_host__server_name }}:{{ bootstrap_llm_host__proxy_port }}

      Models configured:
      {% for model in bootstrap_llm_host__models %}
      - {{ model.name }}
      {% endfor %}

      Management:
      - Use 'llm-server' command for management
      - Check logs: journalctl -u ollama -f
      - Model location: {{ bootstrap_llm_host__ollama_home_dir }}/.ollama/models

      Next steps:
      1. Access the web UI at http://localhost
      2. Create an account in the web interface
      3. Start chatting with your local models!

      ===============================================
