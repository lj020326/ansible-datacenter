- name: llama.cpp | Display ansible_python_interpreter
  ansible.builtin.debug:
    var: ansible_python_interpreter

- name: llama.cpp | Install huggingface_hub CLI into ansible venv
  become: true
  ansible.builtin.pip:
    name: "huggingface_hub[cli,hf_transfer]"
    state: present
