---
# =============================================================================
# Ollama Models Management - Supports native, docker, and swarm runtimes
# =============================================================================

- name: Set Ollama runtime facts
  ansible.builtin.set_fact:
    __ollama_binary: >-
      {% if bootstrap_llm_host__ollama_runtime in ['docker', 'swarm'] %}
      /bin/ollama
      {% else %}
      /usr/local/bin/ollama
      {% endif %}
    __ollama_exec: >-
      {% if bootstrap_llm_host__ollama_runtime == 'native' %}
      sudo -u {{ bootstrap_llm_host__ollama_user }}
      {% elif bootstrap_llm_host__ollama_runtime == 'docker' %}
      docker exec -u root {{ bootstrap_llm_host__ollama_container_name }}
      {% elif bootstrap_llm_host__ollama_runtime == 'swarm' %}
      docker exec -u root $(docker ps -q --filter "name=^{{ bootstrap_llm_host__docker_stack_name }}_{{ bootstrap_llm_host__ollama_service_name }}." --filter "status=running" | head -n 1)
      {% else %}
      echo "ERROR: Unknown ollama_runtime {{ bootstrap_llm_host__ollama_runtime }}" && exit 1
      {% endif %}
    __ollama_models_path: >-
      {% if bootstrap_llm_host__ollama_runtime in ['docker', 'swarm'] %}
      /root/.ollama/models
      {% else %}
      {{ bootstrap_llm_host__model_storage_dir }}
      {% endif %}
    __ollama_host_volume_root: "{{ bootstrap_llm_host__ollama_host_volume_path | default(omit) }}"

- name: Models | Set __models_normalized
  ansible.builtin.set_fact:
    __models_normalized: "{{ bootstrap_llm_host__models
      | map('combine', {'type': item.type | d('pull')})
      | selectattr('type', 'defined')
      | list }}"

- name: Models | Display normalized models list
  ansible.builtin.debug:
    var: __models_normalized

# =============================================================================
# Directory Management
# =============================================================================

- name: Models | Ensure model storage directory exists (native runtime only)
  when: bootstrap_llm_host__ollama_runtime == 'native'
  ansible.builtin.file:
    path: "{{ bootstrap_llm_host__model_storage_dir }}"
    state: directory
    owner: "{{ bootstrap_llm_host__ollama_user }}"
    group: "{{ bootstrap_llm_host__ollama_user }}"
    mode: '0755'
  become: true

- name: Models | Ensure Docker/Swarm volume root exists on host
  when: bootstrap_llm_host__ollama_runtime in ['docker', 'swarm'] and __ollama_host_volume_root is defined
  ansible.builtin.file:
    path: "{{ __ollama_host_volume_root }}"
    state: directory
    owner: "{{ bootstrap_llm_host__ollama_user | default(ansible_user) }}"
    group: "{{ bootstrap_llm_host__ollama_user | default(ansible_user) }}"
    mode: '0755'
  become: true

# =============================================================================
# Model Validation + API Ready Check
# =============================================================================

- name: Models | Validate model tags against Ollama registry
  ansible.builtin.uri:
    url: "https://registry.ollama.ai/v2/library/{{ (item.name.split(':') | first) }}/manifests/{{
      (item.name.split(':') | last) if ':' in item.name else 'latest' }}"
    method: GET
    return_content: false
    status_code: 200
  loop: "{{ __models_normalized | selectattr('type', 'equalto', 'pull') | list }}"
  register: __model_validation
  delegate_to: localhost
  run_once: true
  ignore_errors: true

- name: Models | Assert all models exist in registry
  when: item.status is defined
  no_log: true
  ansible.builtin.assert:
    that: item.status == 200
    fail_msg: "Model '{{ item.item.name }}' not found in Ollama registry."
  loop: "{{ __model_validation.results }}"
  loop_control:
    label: "{{ item.item.name }}"

# =============================================================================
# Wait for Ollama API
# =============================================================================

- name: Models | Wait for Ollama API to be ready
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ bootstrap_llm_host__ollama_port }}/api/tags"
    status_code: 200
  register: _result
  until: _result.status == 200
  retries: 25
  delay: 3

# =============================================================================
# Pull Models (async)
# =============================================================================

- name: Models | Pull standard Ollama models
  when: __models_normalized | selectattr('type', 'equalto', 'pull') | list | length > 0
  ansible.builtin.shell: >
    {{ __ollama_exec }} {{ __ollama_binary }} pull {{ item.name }}
  loop: "{{ __models_normalized | selectattr('type', 'equalto', 'pull') | list }}"
  async: "{{ bootstrap_llm_host__model_download_timeout }}"
  poll: 0
  register: __model_pulls
  changed_when: true

- name: Models | Wait for all async model pulls to complete
  when: item.ansible_job_id is defined
  ansible.builtin.async_status:
    jid: "{{ item.ansible_job_id }}"
  register: __pull_results
  until: __pull_results.finished
  retries: 200
  delay: 20
  loop: "{{ __model_pulls.results | default([]) }}"

# =============================================================================
# Custom Models
# =============================================================================

- name: Models | Create custom models from Modelfile
  when: __models_normalized | selectattr('type', 'equalto', 'custom') | list | length > 0
  block:
    - name: Models | Create Modelfile for custom models
      ansible.builtin.template:
        src: custom.modelfile.j2
        dest: "/tmp/{{ item.id | default(item.name) }}.Modelfile"
        mode: "0644"
        backup: true
      loop: "{{ __models_normalized | selectattr('type', 'equalto', 'custom') | list }}"
      loop_control:
        loop_var: __bootstrap_llm_host__custom_model

    - name: Models | Create custom Ollama models
      ansible.builtin.command: >
        {{ __ollama_exec }} {{ __ollama_binary }} create {{ item.name }}
        -f /tmp/{{ item.name }}.Modelfile
      loop: "{{ __models_normalized | selectattr('type', 'equalto', 'custom') | list }}"
      changed_when: true
      environment:
        OLLAMA_MODELS: "{{ __ollama_models_path }}"

# =============================================================================
# Cleanup
# =============================================================================

- name: Models | Clean up temporary Modelfiles
  ansible.builtin.file:
    path: "/tmp/{{ item.name }}.Modelfile"
    state: absent
  loop: "{{ __models_normalized | selectattr('type', 'equalto', 'custom') | list }}"
