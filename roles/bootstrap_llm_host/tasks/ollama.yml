---
- name: Ollama | Create ollama user
  ansible.builtin.user:
    name: "{{ bootstrap_llm_host__ollama_user }}"
    home: "{{ bootstrap_llm_host__ollama_home_dir }}"
    shell: /bin/bash
    system: false
    create_home: true

- name: Ollama | Check current version
  ansible.builtin.command: /usr/local/bin/ollama --version
  register: __ollama_version_check
  failed_when: false
  changed_when: false

- name: Ollama | Get latest version from GitHub
  ansible.builtin.uri:
    url: https://api.github.com/repos/ollama/ollama/releases/latest
    return_content: true
  register: __ollama_latest_release

- name: Ollama | Set version facts
  ansible.builtin.set_fact:
    current_ollama_ver: "{{ __ollama_version_check.stdout | regex_search('([0-9.]+)') if __ollama_version_check.rc == 0 else '0.0.0' }}"
    latest_ollama_ver: "{{ __ollama_latest_release.json.tag_name | regex_search('([0-9.]+)') }}"

- name: Ollama | Install or Upgrade
  when: current_ollama_ver is version(latest_ollama_ver, '<')
  notify: Restart ollama
  block:
    - name: Ollama | Download install script
      ansible.builtin.get_url:
        url: https://ollama.com/install.sh
        dest: /tmp/ollama_install.sh
        mode: "0755"
      register: __download_result

    - name: Ollama | Run installer
      ansible.builtin.command: "sh /tmp/ollama_install.sh"
      environment:
        OLLAMA_SKIP_INSTALL_SYSTEMD: "1"
      changed_when: true
      register: __ollama_install_result

    - name: Ollama | Display __ollama_install_result
      when:
        - __download_result is succeeded
        - __ollama_install_result.failed | d(true)
      ansible.builtin.debug:
        var: __ollama_install_result | d('')

    - name: Ollama | Clean up install script
      ansible.builtin.file:
        path: /tmp/ollama_install.sh
        state: absent

- name: Ollama | Configure systemd service
  ansible.builtin.template:
    src: ollama.service.j2
    dest: /etc/systemd/system/ollama.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart ollama

- name: Ollama | Enable and start service
  ansible.builtin.systemd:
    name: ollama
    enabled: true
    state: started
    daemon_reload: true

- name: Ollama | Wait for API to be ready
  ansible.builtin.uri:
    url: "http://localhost:{{ bootstrap_llm_host__ollama_port }}/api/tags"
    method: GET
  register: __ollama_ready
  until: __ollama_ready.status == 200
  retries: 30
  delay: 2

- name: Ollama | Install management script
  ansible.builtin.template:
    src: llm-server-mgmt.sh.j2
    dest: /usr/local/bin/llm-server/llm-server-mgmt.sh
    mode: "0755"
    backup: true

- name: Ollama | Load group info
  ansible.builtin.getent:
    database: group
    split: ":"
  check_mode: false

# Note: Requires 'getent group' to have been run or just hardcode if
# you know the target is always Ubuntu/Debian.
- name: Ollama | Ensure user has hardware access
  # We add the user to these groups regardless of GPU presence to ensure
  # consistent environment state if hardware is added later.
  ansible.builtin.user:
    name: "{{ bootstrap_llm_host__ollama_user }}"
    groups:
      - "{{ 'render' if 'render' in ansible_facts.get('getent_group', {}) else [] }}"
      - "{{ 'video' if 'video' in ansible_facts.get('getent_group', {}) else [] }}"
    append: true
