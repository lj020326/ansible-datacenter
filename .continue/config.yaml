name: Ansible Site Config
version: 1.0.0
schema: v1

rules:
  - "This is the main Ansible site/infrastructure repository"
  - "Safety, reproducibility, and idempotency are highest priority"
  - "Never commit secrets — use ansible-vault"
  - "Prefer group_vars/host_vars over hard-coded values"
  - "All playbooks should be well-tagged and documented"

prompts:
  - name: new-role
    description: Create new Ansible role
    prompt: "Write a well-structured Ansible role following current best practices (defaults, documentation, error handling, tests)."

  - name: explain
    description: Explain this code
    prompt: "Explain this code in detail, focusing on what it does, why it does it that way, and any potential improvements."

  - name: readable
    description: make this more readable
    prompt: |
      Make this more readable.

  - name: refactor
    description: Refactor for quality
    prompt: "Refactor this code to be cleaner, more maintainable, and follow best practices while preserving exact functionality."

  - name: test
    description: Generate tests
    prompt: >
      Write molecule tests for this role code.
