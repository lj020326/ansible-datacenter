---
## ref: https://docs.ansible.com/projects/molecule/examples/docker/#create-playbook
- name: Create
  hosts: localhost
  gather_facts: false
  vars:
    molecule_inventory:
      all:
        hosts: {}
  tasks:
    - name: Create a container
      community.docker.docker_container:
        name: "{{ item.name }}"
        image: "{{ item.image }}"
        # Use the command from molecule.yml, or fallback to sleep only if not defined
        command: "{{ item.command | default('sleep 1d') }}"
        privileged: "{{ item.privileged | default(omit) }}"
        volumes: "{{ item.volumes | default(omit) }}"
        tmpfs: "{{ item.tmpfs | default(omit) }}"
        capabilities: "{{ item.capabilities | default(omit) }}"
        cgroupns_mode: "{{ item.cgroupns_mode | default(omit) }}"
        state: started
        log_driver: json-file
      loop: "{{ molecule_yml.platforms }}"
      register: _create_container

    - name: Print some info
      ansible.builtin.debug:
        msg:
          - "container.State.ExitCode={{ item.container.State.ExitCode }}"
          - "container.State.Running={{ item.container.State.Running }}"
      loop: "{{ _create_container.results }}"
      loop_control:
        label: "{{ item.container.Name }}"

    - name: Fail if container is not running
      when: >
        _container_info.container.State.ExitCode != 0 or
        not _container_info.container.State.Running
      ansible.builtin.include_tasks:
        file: tasks/create-fail.yml
      loop: "{{ _create_container.results }}"
      loop_control:
        label: "{{ _container_info.container.Name }}"
        loop_var: _container_info

    - name: Add container to molecule_inventory
      vars:
        inventory_partial_yaml: |
          all:
            children:
              molecule:
                hosts:
                  "{{ item.name }}":
                    ansible_connection: community.docker.docker
      ansible.builtin.set_fact:
        molecule_inventory: >
          {{ molecule_inventory | combine(inventory_partial_yaml | from_yaml, recursive=true) }}
      loop: "{{ molecule_yml.platforms }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Display molecule_inventory
      ansible.builtin.debug:
        var: molecule_inventory

    - name: Dump molecule_inventory
      ansible.builtin.copy:
        content: |
          {{ molecule_inventory | to_yaml }}
        dest: "{{ molecule_ephemeral_directory }}/inventory/molecule_inventory.yml"
        mode: "0600"

    - name: Force inventory refresh
      ansible.builtin.meta: refresh_inventory

    - name: Fail if molecule group is missing
      ansible.builtin.assert:
        that: "'molecule' in groups"
        fail_msg: |
          molecule group was not found inside inventory groups: {{ groups }}
      run_once: true # noqa: run-once[task]

# we want to avoid errors like "Failed to create temporary directory"
- name: Validate that inventory was refreshed
  hosts: molecule
  gather_facts: false
  tasks:
    - name: Display group_names
      ansible.builtin.debug:
        var: group_names

