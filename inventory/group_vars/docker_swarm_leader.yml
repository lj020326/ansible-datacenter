---

bootstrap_docker__swarm_leader: true

# Determines if this node handles cluster-wide operations like Swarm overlay networks
docker_stack__swarm_leader: true
docker_stack__swarm_manager: true

swarm_host_label_traefik: "traefik-enabled"

## used to assign traefik host label to leader host at time of setup / running of "bootstrap_docker" role
## used to assign docker host label to traefik host upon running role "bootstrap_docker"
bootstrap_docker__swarm_node_labels: "{{ {swarm_host_label_traefik: 'true'} }}"

docker_stack__swarm_node_traefik_label: "{{ swarm_host_label_traefik }}"

##########
## crons
##   list of CRONs to be setup for docker_stack machines.
##########
bootstrap_linux_cron__list__docker_stack:
  - name: "Docker disk clean up"
    job: "docker system prune -af 2>&1"
#    job: "docker system prune -af > /dev/null 2>&1"
    ## run 12:00AM every sunday
    schedule: ["0", "0", "*", "*", "0"]
    cron_file: "docker-disk-clean-up"
#    user: "{{ (bootstrap_docker__users | first) | d('root') }}"
  - name: "Docker large log file clean up"
    job: "/opt/scripts/docker-cleanup-large-logfiles.sh -y 2>&1"
    ## run 12:00AM every sunday
    schedule: ["0", "0", "*", "*", "0"]
    cron_file: "docker-large-logfile-clean-up"
#    user: "{{ (bootstrap_docker__users | first) | d('root') }}"

#  ## moved to bootstrap_linux_cron__daily_batch_hooks__docker_stack
#  - name: "Restart the docker stack"
#    job: "{{ docker_stack__restart_stack_command }}"
#    ## run 1:10AM every day
#    schedule: ["10", "1", "*", "*", "*"]
#    cron_file: "docker-stack-restart"
##    user: "{{ (bootstrap_docker__users | first) | d('root') }}"

##########
## daily batch hooks
##   list of hooks to be setup for docker_stack machines.
##########
bootstrap_linux_cron__daily_batch_hooks__docker_stack:
  # 1. Pre-Update Hook: Stop Docker
  - name: "Stop Docker Stack Pre-Update"
    state: present
    hook_type: "pre-update.d"
    filename: "10-docker-stop.sh"
    content: |
      #!/usr/bin/env bash
      echo "Stopping Docker Stack..."
      /usr/local/bin/recreate-stack.sh -sr

  # 3. Post-Update Hook: Start Docker
  - name: "Start Docker Stack Post-Update"
    state: present
    hook_type: "post-update.d"
    filename: "90-docker-start.sh"
    content: |
      #!/usr/bin/env bash
      echo "Starting Docker Stack..."
      systemctl restart docker
