---
bootstrap_llm_host__ollama_port: "11434"
## LLM proxy should listen on a port other than standard stack ports
bootstrap_llm_host__webui_port: "2080"
bootstrap_llm_host__proxy_port: "80"
bootstrap_llm_host__install_open_webui: true
bootstrap_llm_host__install_ollama_webui: false
bootstrap_llm_host__webui_secret_key: "{{ vault__webui_secret_key }}"

bootstrap_llm_host__models:
  - name: "deepseek-coder:6.7b"
  - name: "deepseek-coder:1.3b"
  - name: "deepseek-llm:7b"
  # ~17 GB VRAM at Q4_K_M, excellent coding/reasoning
  - name: "qwen3.5:27b"
  - name: "qwen2.5-coder:32b"
#  - name: "qwen3-coder:32b"
  - name: "llama3.1:8b"

firewalld_ports__llm:
  - "{{ bootstrap_llm_host__proxy_port }}/tcp"
  - "{{ bootstrap_llm_host__webui_port }}/tcp"
  - "{{ bootstrap_llm_host__ollama_port }}/tcp"
