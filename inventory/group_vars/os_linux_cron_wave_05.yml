---
## ----------------
## wave-based batch processing approach is a strategy for managing automated updates and maintenance across
## a fleet of servers. By staggering the updates and separating the dependent tasks (like backups and pruning)
## into later waves, you avoid resource contention and prevent total infrastructure outages.
## ----------------

## Runs at 05:00 AM
bootstrap_linux_cron__list__wave_backups:
  - name: "Wave 05 - Global Backups"
    job: "python3 {{ bootstrap_linux_core__backup_script_dir }}/run-backups.py daily"
    schedule: ["0", "5", "*", "*", "*"]
