bootstrap_pip__env_list__control_host:
  - virtualenv: "{{ ansible_virtualenv }}"
    libraries:
      - ansible
      - pyyaml
      - pywinrm
      - jinja2
      - jmespath
      - netaddr
      - passlib
      - cryptography
      - pyOpenSSL
      - git+https://github.com/vmware/vsphere-automation-sdk-python.git

