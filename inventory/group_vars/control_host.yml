#  - name: "/tmp"
#    src: "tmpfs"
#    fstype: "tmpfs"
#    options: "rw,size=10G,noatime,nosuid,nodev,noexec,relatime,mode=1777"

bootstrap_linux_mount__list__control:
  - name: "/srv/backups"
    src: "{{ nfs_backup_host }}:{{ nfs_backup_share }}"
    fstype: "nfs"
    options: "vers=4.1,proto=tcp,intr,hard,timeo=600,retrans=5,bg,noatime,nodiratime,nofail,_netdev"
#    options: "vers=4.1,proto=tcp,hard,intr,noatime,nodiratime,timeo=150,retrans=2,nofail,_netdev"
#    options: "vers=4.1,intr,auto,nofail,_netdev"
#    options: "vers=4.1,intr,_netdev"

  - name: "/srv/homes"
    src: "{{ nfs_primary_host }}:{{ nfs_homes_share }}"
    fstype: "nfs"
    options: "vers=4.1,intr,auto,nofail,_netdev"

  - name: "/data/homes"
    src: "/srv/homes"
    fstype: none
    options: "ro,bind,nofail,_netdev"

  - name: "/data/backups"
    src: "/srv/backups"
    fstype: none
    options: "ro,bind,nofail,_netdev"

  - name: "/data/plexmedia"
    src: "{{ nfs_media_host }}:{{ nfs_media_share }}"
    fstype: "nfs"
    options: "vers=3,intr,auto,soft,nofail,_netdev"
#    options: "vers=3,intr,auto,nofail,_netdev"
#    options: "vers=4.1,intr,auto,nofail"
