---

#ansible_host: "192.168.0.135"

ipv4_address: 192.168.0.135
ipv4_net_prefix: 16

docker_stack_service_route_name: "media"

#bootstrap_firewalld_exposed_ports:
#  - 10000/tcp
#
#firewalld_exposed_ports:
#  - 10000/tcp

firewalld_default_enable_source_port_53: yes

nfs_exports:
  - "/export      *(rw,fsid=0,async,nohide,no_root_squash,no_subtree_check,crossmnt)"
  - "/export/media         192.168.0.0/255.255.0.0(rw,async,nohide,no_subtree_check)"

