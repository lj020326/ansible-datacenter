node_mounts:
  - name: "/tmp"
    src: "tmpfs"
    fstype: "tmpfs"
    ## ref: https://forums.plex.tv/t/guide-plex-media-server-with-intel-nuc-and-ubuntu-16-04-lts/217937
    options: 'size=100G,defaults,noatime,nosuid,nodev,mode=1777'

  - name: "/data"
#    src: "control01.johnson.int:/srv/data1/data"
    src: "control01.johnson.int:/data"
    fstype: "nfs"
    options: "intr,_netdev"

#  - name: "/srv/media"
#    src: "control01.johnson.int:/srv/data2/data/media"
#    fstype: "nfs"
#    options: "intr,_netdev"

  - name: "/srv/media"
    src: "nas02.dettonville.int:/mnt/storage/media"
    fstype: "nfs"
    options: "intr,_netdev"

  - name: "/srv/media_control"
    src: "control01.johnson.int:/export/data/media"
    fstype: "nfs"
    options: "intr,_netdev"

